<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Certificate Preview - Parent Academy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#107dd5",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["IBM Plex Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neon-rainbow-border {
            position: relative;
            background: white;
            border-radius: 1rem;
            padding: 2px;
            background-clip: padding-box;
            border: 2px solid transparent;
        }
        .neon-rainbow-border::before {
            content: '';
            position: absolute;
            top: -2px; bottom: -2px;
            left: -2px; right: -2px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            z-index: -1;
            border-radius: 1.1rem;
            animation: none;
            opacity: 0.8;
        }
        .mesh-gradient {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 125, 213, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(122, 0, 255, 0.05) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-body min-h-screen flex items-center justify-center p-4">
<!-- Social Sharing Card Container (Approx 1.91:1 aspect ratio) -->
<div class="relative w-full max-w-[800px] aspect-[1.91/1] neon-rainbow-border shadow-2xl overflow-hidden group">
<!-- Main Content Area -->
<div class="h-full w-full bg-white dark:bg-slate-900 flex flex-row overflow-hidden rounded-xl mesh-gradient">
<!-- Left Side: Certificate Details -->
<div class="flex-1 p-8 md:p-12 flex flex-col justify-between relative z-10">
<!-- Logo & Brand -->
<div class="flex items-center gap-3">
<div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">hub</span>
</div>
<div>
<h2 class="font-display font-extrabold text-xl tracking-tight text-slate-900 dark:text-white">Parent Academy</h2>
<p class="text-[10px] uppercase tracking-[0.2em] font-bold text-primary">Future-Ready Parenting</p>
</div>
</div>
<!-- Main Titles -->
<div class="space-y-2 py-6">
<p class="font-display font-semibold text-primary text-sm tracking-[0.3em] uppercase">Certificate of Completion</p>
<h1 class="font-display font-extrabold text-3xl md:text-4xl text-slate-900 dark:text-white leading-tight">
                        Alex Morgan
                    </h1>
<div class="h-1 w-16 bg-gradient-to-r from-primary to-purple-500 rounded-full"></div>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium max-w-[280px] mt-4">
                        Raising Humans in the Age of Algorithms
                    </p>
</div>
<!-- Footer/Button -->
<div class="flex items-center gap-6">
<button class="bg-primary hover:bg-primary/90 text-white font-display font-bold px-6 py-3 rounded-lg flex items-center gap-2 transition-all shadow-lg shadow-primary/20">
<span>View Credential</span>
<span class="material-symbols-outlined text-sm">open_in_new</span>
</button>
<div class="hidden md:flex flex-col">
<span class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Issued Date</span>
<span class="text-xs font-semibold text-slate-900 dark:text-slate-200">October 2023</span>
</div>
</div>
</div>
<!-- Right Side: Imagery -->
<div class="hidden md:block w-[40%] relative">
<div class="absolute inset-0 bg-gradient-to-r from-white dark:from-slate-900 via-transparent to-transparent z-10"></div>
<div class="h-full w-full bg-cover bg-center" data-alt="A parent and young child smiling while looking at a tablet together in a bright room" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB-eLTmRolp76imWeDPBhnQutnlpQES96D6PWsOJI0-LmIHBgz-_rNGCORY5t_hsKkQSJ964N4a_vDyG7NrzKncPdm7ascRPyRO2Cy_sEfmvO7nCOUEfT3OctXee3c_mpEYoZAScUzxGq-xgTRNE4e5KJNZD2clO9IOspipOLCEuvPa86yVsWZwvwNBI0HfWN7Nb-7aUlEOH-lPyWWeY8F3DeNnE5SH7ZqKglo-p49ZrvUCvIQlqpzwN2mmBRXUN17PrSzeEKNaSI9D');">
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-6 right-6 z-20 bg-white/90 dark:bg-slate-800/90 backdrop-blur px-4 py-2 rounded-lg border border-slate-200/50 dark:border-slate-700/50 flex items-center gap-3">
<div class="size-8 rounded-full bg-green-500/20 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined text-lg">verified</span>
</div>
<div class="text-[10px] font-bold text-slate-600 dark:text-slate-300 leading-tight uppercase tracking-wider">
                        Verified<br/>Credential
                    </div>
</div>
</div>
</div>
<!-- Subtle Pattern Overlay for Credibility -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] dark:opacity-[0.05]" style="background-image: radial-gradient(#000 0.5px, transparent 0.5px); background-size: 16px 16px;"></div>
</div>
<!-- Interface Controls (For Demo Purposes) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4">
<div class="bg-white dark:bg-slate-800 p-2 rounded-full shadow-xl flex gap-2 border border-slate-200 dark:border-slate-700">
<button class="p-2 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">share</span>
</button><button class="p-2 rounded-full hover:bg-pink-100 dark:hover:bg-pink-900/30 text-slate-600 dark:text-slate-400 hover:text-pink-600 transition-colors group" title="Post to Instagram">
<span class="material-symbols-outlined flex items-center justify-center">add_to_photos</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined">download</span>
</button>
<div class="w-px h-6 bg-slate-200 dark:bg-slate-700 my-auto mx-1"></div>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-outlined">dark_mode</span>
</button>
</div>
</div>
</body></html>
