    const SFX = {
      _started: false,
      async _ensure() {
        if (this.muted) return false;
        if (!this._started) {
          await Tone.start();
          this._started = true;
        }
        return true;
      },
      async correct() {
        if (!(await this._ensure())) return;
        const synth = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.15, sustain: 0.05, release: 0.3 } }).toDestination();
        synth.volume.value = -8;
        synth.triggerAttackRelease("C5", "8n", Tone.now());
        synth.triggerAttackRelease("E5", "8n", Tone.now() + 0.12);
        synth.triggerAttackRelease("G5", "8n", Tone.now() + 0.24);
        setTimeout(() => synth.dispose(), 1500);
      },
      async wrong() {
        if (!(await this._ensure())) return;
        const synth = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.05, release: 0.2 } }).toDestination();
        synth.volume.value = -12;
        synth.triggerAttackRelease("E3", "16n", Tone.now());
        synth.triggerAttackRelease("Eb3", "8n", Tone.now() + 0.15);
        setTimeout(() => synth.dispose(), 1500);
      },
      async whoosh() {
        if (!(await this._ensure())) return;
        const noise = new Tone.Noise("white").toDestination();
        noise.volume.value = -22;
        const filter = new Tone.Filter({ frequency: 800, type: "bandpass", Q: 2 }).toDestination();
        noise.disconnect();
        noise.connect(filter);
        noise.start();
        filter.frequency.rampTo(2000, 0.15);
        filter.frequency.rampTo(200, 0.2, "+0.15");
        setTimeout(() => { noise.stop(); noise.dispose(); filter.dispose(); }, 500);
      },
      async lightbulb() {
        if (!(await this._ensure())) return;
        const synth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.3 } }).toDestination();
        synth.volume.value = -10;
        synth.triggerAttackRelease("A5", "16n", Tone.now());
        synth.triggerAttackRelease("E6", "16n", Tone.now() + 0.08);
        setTimeout(() => synth.dispose(), 1500);
      },
      async celebrate() {
        if (!(await this._ensure())) return;
        const synth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.4 } }).toDestination();
        synth.volume.value = -8;
        const t = Tone.now();
        synth.triggerAttackRelease("C5", "8n", t);
        synth.triggerAttackRelease("E5", "8n", t + 0.1);
        synth.triggerAttackRelease("G5", "8n", t + 0.2);
        synth.triggerAttackRelease("C6", "4n", t + 0.35);
        synth.triggerAttackRelease(["E5", "G5", "C6"], "4n", t + 0.55);
        setTimeout(() => synth.dispose(), 2500);
      },
      async tap() {
        if (!(await this._ensure())) return;
        const synth = new Tone.MembraneSynth({ pitchDecay: 0.01, octaves: 2, envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
        synth.volume.value = -18;
        synth.triggerAttackRelease("C2", "32n");
        setTimeout(() => synth.dispose(), 500);
      },

        if (!(await this._ensure())) return;
        const synth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.02, decay: 0.15, sustain: 0.05, release: 0.3 } }).toDestination();

        synth.triggerAttackRelease("C5", "16n", Tone.now() + 0.1);
        setTimeout(() => synth.dispose(), 1000);
      },

    function SlideSort({ s }) {
      const [cur, setCur] = useState(0);
      const [sc, setSc] = useState(0);
      const [sel, setSel] = useState(null);
      const [rev, setRev] = useState(false);
      const regions = ["New England", "Middle", "Southern"];
      const colors = { "New England": "#3498db", Middle: "#f0b429", Southern: "#e74c3c" };

      if (cur >= s.items.length) {
        return <SortScoreScreen sc={sc} total={s.items.length} />;
      }
      const item = s.items[cur];
      const pick = (r) => {
        if (rev) return;
        setSel(r);
        setRev(true);
        if (r === item.answer) { setSc(prev => prev + 1); SFX.correct(); } else { SFX.wrong(); }
      };
      const next = () => { setCur(c => c + 1); setSel(null); setRev(false); };

      return (
        <div style={{ animation: "fadeIn 0.35s ease" }} key={cur}>
          <div style={{ textAlign: "center", marginBottom: 8 }}>
            <div style={{ fontFamily: F, fontSize: 20, color: "#d4880f" }}>{s.title}</div>

        if (s.category !== prevCat.current) {
          SFX.sectionChange();
          prevCat.current = s.category;
        }
      }, [slide]);

      const goNext = () => { SFX.whoosh(); setSlide(prev => prev + 1); };
      const goBack = () => { SFX.tap(); setSlide(prev => prev - 1); };

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #faf9f6 0%, #f3f1ec 50%, #edeae3 100%)", color: "#2a2520", fontFamily: B }}>
          {/* Back to portfolio link */}
          <a href="/ange-portfolio/" style={{ position: "fixed", top: 12, left: 12, zIndex: 200, fontFamily: B, fontSize: 13, color: "#7a756d", textDecoration: "none", background: "rgba(250,249,246,0.92)", padding: "6px 12px", borderRadius: 20, border: "1px solid #e0ddd5", backdropFilter: "blur(8px)", display: "inline-flex", alignItems: "center", gap: 4 }}>← Portfolio</a>

          {/* Sticky header with progress bar */}
          <div style={{ position: "sticky", top: 0, zIndex: 100, background: "#faf9f6ee", padding: "8px 16px", backdropFilter: "blur(8px)", borderBottom: "1px solid #e8e5de" }}>
            <div style={{ maxWidth: 600, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <span style={{ fontFamily: M, fontSize: 10, color: catColors[s.category], textTransform: "uppercase", letterSpacing: 2 }}>{cats[s.category]}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={toggleMute} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", padding: 0, lineHeight: 1 }} title={muted ? "Unmute" : "Mute"}>
                    {muted ? "🔇" : "🔊"}
                  </button>
                  <span style={{ fontFamily: M, fontSize: 10, color: "#b5b0a8" }}>{slide + 1} / {total}</span>
                </div>
              </div>
              <div style={{ height: 6, background: "#e8e5de", borderRadius: 99, overflow: "hidden" }}>
                <div style={{ width: `${pct}%`, height: "100%", background: "linear-gradient(90deg, #d4880f, #c0392b, #7d3c98)", borderRadius: 99, transition: "width 0.4s" }} />
              </div>
            </div>
          </div>

          {/* Slide content */}
          <div style={{ maxWidth: 600, margin: "0 auto", padding: "20px 16px 100px" }}>
            {s.type === "teach"   && <SlideTeach   s={s} key={slide} />}
            {s.type === "trick"   && <SlideTrick   s={s} key={slide} />}
            {s.type === "video"   && <SlideVideo   s={s} key={slide} />}
            {s.type === "quiz"    && <SlideQuiz    s={s} key={slide} />}
            {s.type === "whoami"  && <SlideWhoAmI  s={s} key={slide} />}
            {s.type === "sort"    && <SlideSort    s={s} key={slide} />}
            {s.type === "pyramid" && <SlidePyramid     key={slide} />}
            {s.type === "summary" && <SlideSummary     key={slide} />}
          </div>

          {/* Fixed navigation bar */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "linear-gradient(transparent, #faf9f6ee 30%)", padding: "20px 16px 16px" }}>
            <div style={{ maxWidth: 600, margin: "0 auto", display: "flex", gap: 12 }}>
              {slide > 0 && (
                <button onClick={goBack} style={{ flex: 0, background: "#fff", color: "#7a756d", border: "2px solid #e0ddd5", borderRadius: 14, padding: "14px 24px", fontSize: 16, fontFamily: F, cursor: "pointer" }}>← BACK</button>
              )}
              {slide < total - 1 && (
                <button onClick={goNext} style={{ flex: 1, background: "linear-gradient(135deg, #d4880f, #c67a0a)", color: "#fff", border: "none", borderRadius: 14, padding: "14px 24px", fontSize: 18, fontFamily: F, cursor: "pointer", letterSpacing: 1, boxShadow: "0 4px 12px rgba(212,136,15,0.3)" }}>NEXT →</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── MOUNT ───
    ReactDOM.createRoot(document.getElementById('root')).render(<ColonialLesson />);
  </script>
</body>
</html>
