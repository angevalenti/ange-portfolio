const state = {
  completedUnits: new Set(),
  quizScores:     {},
  currentUnitId:  null,
  quiz: { currentQ: 0, score: 0, answered: false, done: false }
};

/* ══════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════ */
function renderDashboard() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';

  /* update translatable header elements */
  const titleEl = document.querySelector('.dash-title');
  if (titleEl) {
    const full   = t('dashTitle');
    const accent = t('dashTitleAccent');
    const idx    = full.indexOf(accent);
    titleEl.innerHTML = idx >= 0
      ? `${full.substring(0, idx)}<span class="accent">${accent}</span>${full.substring(idx + accent.length)}`
      : full;
  }
  const subtitleEl = document.querySelector('.dash-subtitle');
  if (subtitleEl) subtitleEl.textContent = t('dashSubtitle');
  const progressLabelEl = document.querySelector('.progress-panel-label');
  if (progressLabelEl) progressLabelEl.textContent = t('courseProgress');

  currentUnits().forEach((unit, i) => {
    const card = buildCard(unit);
    grid.appendChild(card);
    // stagger reveal
    requestAnimationFrame(() => {
      setTimeout(() => card.classList.add('revealed'), 60 + i * 70);
    });
  });

  updateProgressBar();
}

function buildCard(unit) {
  const done   = state.completedUnits.has(unit.id);
  const score  = state.quizScores[unit.id];
  const hasQ   = unit.quiz.length > 0;

  const card = document.createElement('div');
  card.className = 'unit-card';
  card.style.cssText = `--accent: ${unit.accent}; --accent-rgb: ${unit.accentRgb};`;
  card.setAttribute('tabindex', '0');
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `${done ? t('reviewUnit') : t('startUnit')}: ${unit.title}`);
  card.onclick = () => openUnit(unit.id);
  card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openUnit(unit.id); } };

  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon-pill" style="background: rgba(${unit.accentRgb}, 0.14);" aria-hidden="true">
        <span class="pill-emoji">${unit.icon}</span>
        <span class="pill-label" style="color: ${unit.accent};">Unit 0${unit.id}</span>
      </div>
      ${done ? `<span class="badge-complete">${t('completed')}</span>` : ''}
    </div>
    <div class="card-body">
      <h2 class="card-title">${unit.title}</h2>
      <div class="card-desc">${unit.description}</div>
    </div>
    <div class="card-bottom">
      <span class="card-status-text">
        ${score !== undefined ? `${t('quizScore')}: ${score}/${unit.quiz.length}` : t('notStarted')}
      </span>
      <span class="card-action" style="color: ${unit.accent};" aria-hidden="true">
        ${done ? t('reviewUnit') : t('startUnit')} <span class="card-arrow">&rarr;</span>
      </span>
    </div>
  `;
  return card;
}

function updateProgressBar() {
  const count  = state.completedUnits.size;
  const total  = UNITS.length;
  const pct    = count === 0 ? 0 : Math.round(count / total * 100);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = t('unitCompleted', count, total);
}

/* ══════════════════════════════════════════════
   UNIT VIEW — NAVIGATION
══════════════════════════════════════════════ */
function openUnit(unitId) {
  const unit = currentUnits().find(u => u.id === unitId);
  state.currentUnitId = unitId;
  resetQuiz();
  renderUnitView(unit);
  const view = document.getElementById('unit-view');
  view.scrollTo({ top: 0 });
  view.classList.add('active');
}

function goBack() {
  document.getElementById('unit-view').classList.remove('active');
  renderDashboard();
}

/* ══════════════════════════════════════════════
   UNIT VIEW — RENDER
══════════════════════════════════════════════ */
function renderUnitView(unit) {
  const view = document.getElementById('unit-view');
  view.style.setProperty('--unit-accent',     unit.accent);
  view.style.setProperty('--unit-accent-rgb', unit.accentRgb);
  view.style.setProperty('--unit-kw',         unit.kwColor);

  const letters = ['A','B','C','D'];

  let html = `
    <button class="back-btn" onclick="goBack()" aria-label="${t('backToDashboard')}">
      <span class="back-arrow" aria-hidden="true">&larr;</span> ${t('backToDashboard')}
    </button>

    <div class="unit-header">
      <div class="unit-icon-pill" style="background: rgba(${unit.accentRgb}, 0.14);" aria-hidden="true">
        <span class="pill-emoji">${unit.icon}</span>
        <span class="pill-label" style="color: ${unit.accent};">Unit 0${unit.id}: ${unit.title}</span>
      </div>
      <h1 class="unit-view-title">${unit.title}</h1>
      <p class="unit-view-desc">${unit.description}</p>
    </div>
  `;

  if (unit.comingSoon) {
    html += `
      <div class="coming-soon-panel">
        <div class="coming-soon-icon">&#128679;</div>
        <div class="coming-soon-title">Coming Soon</div>
        <p class="coming-soon-msg">This unit is coming soon. Check back after completing Unit 01.</p>
      </div>
    `;
  } else {
    /* ── Learn section ── */
    const accordionItems = unit.chunks.map((chunk, i) => `
      <div class="acc-item" id="acc-${i}">
        <h3 class="acc-heading">
          <button class="acc-trigger" onclick="toggleAcc(${i})"
                  aria-expanded="false" aria-controls="panel-${i}"
                  aria-label="Section ${i + 1}: ${chunk.title}">
            <span class="acc-num" aria-hidden="true">${i + 1}</span>
            <span class="acc-title">${chunk.title}</span>
            <span class="acc-chevron" aria-hidden="true">&#9660;</span>
          </button>
        </h3>
        <div class="acc-panel" id="panel-${i}" role="region" aria-label="${chunk.title}">
          <div class="acc-content">${chunk.content}</div>
        </div>
      </div>
    `).join('');

    html += `
      <section class="learn-section" aria-label="${t('learnTheBasics')}">
        <div class="learn-heading-row">
          <div class="learn-book-pill" aria-hidden="true">&#128218;</div>
          <h2 class="section-heading" style="margin-bottom: 0;">${t('learnTheBasics')}</h2>
        </div>
        <div class="accordion-list">${accordionItems}</div>
      </section>
    `;

    /* ── Quiz section ── */
    if (unit.quiz.length > 0) {
      const q        = state.quiz;
      const question = unit.quiz[q.currentQ];
      const progress = (q.currentQ / unit.quiz.length) * 100;

      const optionsHtml = question.options.map((opt, i) => `
        <li class="quiz-option" data-idx="${i}" onclick="selectOption(${i})"
            role="button" tabindex="0"
            onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectOption(${i})}">
          <span class="opt-letter" aria-hidden="true">${letters[i]}</span>
          <span>${opt}</span>
        </li>
      `).join('');

      html += `
        <section class="quiz-section" aria-label="${t('testYourKnowledge')}">
          <div class="quiz-heading-row">
            <div class="quiz-brain-pill" aria-hidden="true">&#129504;</div>
            <h2 class="section-heading" style="margin-bottom: 0;">${t('testYourKnowledge')}</h2>
          </div>
          <p class="quiz-instruction">${t('quizInstruction')}</p>
          <div class="quiz-card" id="quiz-card">
            <div class="quiz-meta-row">
              <span class="quiz-q-label">${t('question')} ${q.currentQ + 1} ${t('of')} ${unit.quiz.length}</span>
              <span class="quiz-score-label">${t('score')}: ${q.score}</span>
            </div>
            <div class="quiz-mini-track" role="progressbar" aria-valuenow="${q.currentQ}" aria-valuemin="0" aria-valuemax="${unit.quiz.length}" aria-label="Quiz progress">
              <div class="quiz-mini-fill" style="width: ${progress}%;"></div>
            </div>
            <div role="group" aria-label="${t('question')} ${q.currentQ + 1} ${t('of')} ${unit.quiz.length}">
              <div class="quiz-question" id="quiz-question-text">${question.question}</div>
              <ul class="quiz-options" id="quiz-options" aria-labelledby="quiz-question-text">${optionsHtml}</ul>
            </div>
            <div class="quiz-feedback" id="quiz-feedback" aria-live="polite" aria-atomic="true"></div>
            <button class="quiz-next-btn" id="quiz-next" onclick="nextQuestion()">
              ${q.currentQ < unit.quiz.length - 1 ? t('nextQuestion') : t('seeResults')}
            </button>
          </div>
        </section>
      `;
    }
  }

  document.getElementById('unit-container').innerHTML = html;
  applyTooltips();
}

function refreshQuizCard() {
  const unit     = currentUnits().find(u => u.id === state.currentUnitId);
  const q        = state.quiz;
  const letters  = ['A','B','C','D'];

  if (q.done) {
    showResults(unit);
    return;
  }

  const question = unit.quiz[q.currentQ];
  const progress = (q.currentQ / unit.quiz.length) * 100;

  const optionsHtml = question.options.map((opt, i) => `
    <li class="quiz-option" data-idx="${i}" onclick="selectOption(${i})"
        role="button" tabindex="0"
        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();selectOption(${i})}">
      <span class="opt-letter" aria-hidden="true">${letters[i]}</span>
      <span>${opt}</span>
    </li>
  `).join('');

  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-meta-row">
      <span class="quiz-q-label">${t('question')} ${q.currentQ + 1} ${t('of')} ${unit.quiz.length}</span>
      <span class="quiz-score-label">${t('score')}: ${q.score}</span>
    </div>
    <div class="quiz-mini-track" role="progressbar" aria-valuenow="${q.currentQ}" aria-valuemin="0" aria-valuemax="${unit.quiz.length}" aria-label="Quiz progress">
      <div class="quiz-mini-fill" style="width: ${progress}%;"></div>
    </div>
    <div role="group" aria-label="${t('question')} ${q.currentQ + 1} ${t('of')} ${unit.quiz.length}">
      <div class="quiz-question" id="quiz-question-text">${question.question}</div>
      <ul class="quiz-options" id="quiz-options" aria-labelledby="quiz-question-text">${optionsHtml}</ul>
    </div>
    <div class="quiz-feedback" id="quiz-feedback" aria-live="polite" aria-atomic="true"></div>
    <button class="quiz-next-btn" id="quiz-next" onclick="nextQuestion()">
      ${q.currentQ < unit.quiz.length - 1 ? t('nextQuestion') : t('seeResults')}
    </button>
  `;
  applyTooltips();
}

function showResults(unit) {
  const q   = state.quiz;
  const pct = Math.round(q.score / unit.quiz.length * 100);
  const msg =
    pct === 100 ? t('resultPerfect', unit.quiz.length) :
    pct >= 75   ? t('resultGood',    q.score, unit.quiz.length) :
    pct >= 50   ? t('resultOk',      q.score, unit.quiz.length) :
                  t('resultTryAgain',q.score, unit.quiz.length);

  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-results">
      <div class="result-score">${q.score}<span class="denom">/${unit.quiz.length}</span></div>
      <p class="result-msg">${msg}</p>
      <div class="result-btns">
        <button class="btn-retake" onclick="retakeQuiz()">${t('retakeQuiz')}</button>
        <button class="btn-mark-complete" style="background: ${unit.accent};" onclick="markComplete()">
          ${t('markComplete')}
        </button>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════════════════
   QUIZ LOGIC
══════════════════════════════════════════════ */
function resetQuiz() {
  state.quiz = { currentQ: 0, score: 0, answered: false, done: false };
}

function selectOption(index) {
  if (state.quiz.answered) return;
  state.quiz.answered = true;

  const unit      = currentUnits().find(u => u.id === state.currentUnitId);
  const question  = unit.quiz[state.quiz.currentQ];
  const isCorrect = index === question.correct;

  if (isCorrect) state.quiz.score++;

  // Lock all options and mark correct/wrong
  document.querySelectorAll('.quiz-option').forEach(opt => opt.classList.add('locked'));
  const opts = document.querySelectorAll('.quiz-option');
  opts[index].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[question.correct].classList.add('correct');

  // Non-color indicator: swap letter labels to ✓/✗
  opts[index].querySelector('.opt-letter').textContent = isCorrect ? '✓' : '✗';
  if (!isCorrect) opts[question.correct].querySelector('.opt-letter').textContent = '✓';

  // Feedback
  const fb = document.getElementById('quiz-feedback');
  fb.innerHTML = isCorrect ? question.feedbackCorrect : question.feedbackWrong;
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'good' : 'bad');

  // Show next button
  document.getElementById('quiz-next').classList.add('show');
}

function nextQuestion() {
  const unit = currentUnits().find(u => u.id === state.currentUnitId);

  if (state.quiz.currentQ < unit.quiz.length - 1) {
    state.quiz.currentQ++;
    state.quiz.answered = false;
    refreshQuizCard();
  } else {
    state.quiz.done = true;
    state.quizScores[unit.id] = state.quiz.score;
    showResults(unit);
  }
}

function retakeQuiz() {
  resetQuiz();
  refreshQuizCard();
}

function markComplete() {
  state.completedUnits.add(state.currentUnitId);
  goBack();
}

/* ══════════════════════════════════════════════
   ACCORDION
══════════════════════════════════════════════ */
function toggleAcc(index) {
  const item   = document.getElementById('acc-' + index);
  const isOpen = item.classList.contains('open');

  // Close all and reset aria-expanded
  document.querySelectorAll('.acc-item').forEach(el => {
    el.classList.remove('open');
    const btn = el.querySelector('.acc-trigger');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  });

  // Open clicked if it was closed
  if (!isOpen) {
    item.classList.add('open');
    const btn = item.querySelector('.acc-trigger');
    if (btn) btn.setAttribute('aria-expanded', 'true');
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderDashboard();
</script>
