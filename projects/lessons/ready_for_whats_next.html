<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ready for What's Next</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Noto+Sans:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0B0B12;
      --card-bg:      #151520;
      --border:       #2A2A3C;
      --text-primary: #F0F0F5;
      --text-secondary: #A0A0B2;
      --text-muted:   #8888A0;
      --kw:           #46ECD5;
      --prog-from:    #06D6A0;
      --prog-to:      #00D4FF;
    }

    html {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', 'Noto Sans', sans-serif;
      font-weight: 400;
      min-height: 100%;
    }

    body { min-height: 100%; }

    /* ─── Language Toggle ─── */
    #lang-toggle {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 1001;
      display: flex;
      gap: 2px;
      background: #151520;
      border: 1px solid #2A2A3C;
      border-radius: 999px;
      padding: 3px;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: 'Outfit', 'Noto Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .lang-btn:hover { color: var(--text-primary); }
    .lang-btn.active {
      background: rgba(0, 212, 255, 0.12);
      color: #00D4FF;
    }
    #lang-toggle.unit-active .lang-btn.active {
      background: rgba(var(--toggle-accent-rgb, 0, 212, 255), 0.14);
      color: var(--toggle-accent, #00D4FF);
    }

    /* ─── WIDA Badge ─── */
    #wida-badge {
      position: fixed;
      top: 62px;
      right: 20px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(21, 21, 32, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 13px 6px 10px;
      backdrop-filter: blur(8px);
    }
    #wida-badge .wida-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3B82F6;
      box-shadow: 0 0 6px #3B82F6;
      flex-shrink: 0;
    }
    #wida-badge span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ─── Dashboard ─── */
    #dashboard {
      opacity: 0;
      animation: fadeIn 0.45s ease 0.05s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .dash-container {
      max-width: 1152px;
      margin: 0 auto;
      padding: 48px 16px 80px;
    }

    .dash-header { margin-bottom: 32px; }

    .dash-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .dash-title .accent { color: var(--kw); }

    .dash-subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* Progress panel */
    .progress-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 26px;
      margin-bottom: 32px;
    }
    .progress-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .progress-panel-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .progress-panel-count {
      font-size: 0.88rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--prog-from), var(--prog-to));
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Unit grid */
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .unit-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px) { .unit-grid { grid-template-columns: 1fr; } }

    /* Unit card */
    .unit-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }
    .unit-card.revealed {
      opacity: 1;
      transform: translateY(0);
    }
    .unit-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.18);
      transform: translateY(-4px);
    }
    .unit-card:hover .card-arrow { transform: translateX(4px); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .card-icon-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
    }
    .card-icon-pill .pill-emoji { font-size: 1rem; line-height: 1; }
    .card-icon-pill .pill-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .badge-complete {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(6, 214, 160, 0.1);
      color: #06D6A0;
      letter-spacing: 0.04em;
      border: 1px solid rgba(6, 214, 160, 0.28);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-body { flex: 1; }
    .card-title {
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 5px;
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-status-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .card-action {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .card-arrow {
      transition: transform 0.2s ease;
      display: inline-block;
    }

    /* ─── Unit View ─── */
    #unit-view {
      position: fixed;
      inset: 0;
      background: var(--bg);
      overflow-y: auto;
      z-index: 100;
      transform: translateX(24px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    #unit-view.active {
      transform: translateX(0);
      opacity: 1;
      pointer-events: all;
    }

    .unit-container {
      max-width: 768px;
      margin: 0 auto;
      padding: 48px 16px 100px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-primary); }
    .back-btn .back-arrow { transition: transform 0.2s ease; display: inline-block; }
    .back-btn:hover .back-arrow { transform: translateX(-4px); }

    /* Unit header */
    .unit-header { margin-bottom: 44px; }

    .unit-icon-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 24px;
      padding: 8px 16px;
      margin-bottom: 20px;
    }
    .unit-icon-pill .pill-emoji { font-size: 1.25rem; line-height: 1; }
    .unit-icon-pill .pill-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .unit-view-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.85rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.12;
      margin-bottom: 10px;
    }
    .unit-view-desc {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Section heading */
    .section-heading {
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    /* Learn section */
    .learn-section { margin-bottom: 52px; }

    /* Accordions */
    .accordion-list { display: flex; flex-direction: column; gap: 8px; }

    .acc-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }
    .acc-item.open { border-color: rgba(var(--unit-accent-rgb), 0.4); }

    .acc-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .acc-trigger:hover { background: rgba(255,255,255,0.018); }

    .acc-num {
      width: 26px; height: 26px;
      flex-shrink: 0;
      border-radius: 6px;
      background: #1E1E2E;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .acc-title {
      flex: 1;
      font-size: 0.96rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .acc-chevron {
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .acc-item.open .acc-chevron { transform: rotate(180deg); }

    .acc-panel {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease;
    }
    .acc-item.open .acc-panel {
      max-height: 400px;
      opacity: 1;
    }
    .acc-content {
      padding: 0 18px 18px calc(18px + 26px + 14px);
      font-size: 0.94rem;
      color: var(--text-secondary);
      line-height: 1.75;
    }
    .kw {
      color: var(--unit-kw, #46ECD5);
      font-weight: 600;
      position: relative;
      cursor: help;
    }
    .kw-tooltip {
      display: none;
      position: absolute;
      left: 50%;
      top: calc(100% + 6px);
      transform: translateX(-50%);
      background: #1E1E2E;
      border: 1px solid #3A3A4C;
      color: #F0F0F5;
      font-family: 'Outfit', sans-serif;
      font-size: 0.77rem;
      font-weight: 400;
      line-height: 1.5;
      padding: 7px 11px;
      border-radius: 8px;
      white-space: normal;
      max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 200;
      pointer-events: none;
    }
    .kw:hover .kw-tooltip,
    .kw:focus .kw-tooltip { display: block; }
    .kw:focus { outline: 2px solid currentColor; outline-offset: 2px; border-radius: 2px; }

    /* Focus rings */
    :focus-visible {
      outline: 2px solid #00D4FF;
      outline-offset: 3px;
      border-radius: 4px;
    }
    #unit-view :focus-visible { outline-color: var(--unit-accent, #00D4FF); }
    .unit-card:focus-visible   { outline-color: var(--accent, #00D4FF); }

    /* Accordion overflow — allow tooltips to escape */
    .acc-item.open            { overflow: visible; }
    .acc-item.open .acc-panel { overflow: visible; }

    /* Learn section heading row */
    .learn-heading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .learn-book-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .acc-heading { margin: 0; }
    .quiz-instruction {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Quiz section */
    .quiz-heading-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .quiz-brain-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(70, 236, 213, 0.08);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
    }

    .quiz-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .quiz-q-label {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .quiz-score-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .quiz-mini-track {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .quiz-mini-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--prog-from), var(--prog-to));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .quiz-question {
      font-size: 1.03rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.58;
      margin-bottom: 18px;
    }

    .quiz-options { display: flex; flex-direction: column; gap: 9px; list-style: none; }

    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 15px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.018);
      cursor: pointer;
      font-size: 0.94rem;
      color: var(--text-secondary);
      line-height: 1.5;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }
    .quiz-option:not(.locked):hover {
      border-color: rgba(var(--unit-accent-rgb), 0.45);
      background: rgba(var(--unit-accent-rgb), 0.06);
      color: var(--text-primary);
    }
    .quiz-option.correct {
      border-color: #06D6A0;
      background: rgba(6, 214, 160, 0.08);
      color: #06D6A0;
    }
    .quiz-option.wrong {
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.05);
      color: rgba(239, 68, 68, 0.8);
    }
    .quiz-option.locked { cursor: default; }

    .opt-letter {
      font-size: 0.7rem;
      font-weight: 700;
      width: 18px;
      flex-shrink: 0;
      color: var(--text-muted);
      padding-top: 3px;
    }
    .quiz-option.correct .opt-letter { color: #06D6A0; }
    .quiz-option.wrong   .opt-letter { color: rgba(239,68,68,0.8); }

    .quiz-feedback {
      margin-top: 14px;
      padding: 11px 15px;
      border-radius: 8px;
      font-size: 0.91rem;
      line-height: 1.55;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.good {
      background: rgba(6, 214, 160, 0.08);
      border: 1px solid rgba(6, 214, 160, 0.28);
      color: #06D6A0;
    }
    .quiz-feedback.bad {
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.22);
      color: rgba(239, 68, 68, 0.85);
    }

    .quiz-next-btn {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      background: var(--unit-accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      font-weight: 700;
      padding: 11px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.2s;
    }
    .quiz-next-btn.show { display: inline-flex; }
    .quiz-next-btn:hover { opacity: 0.87; transform: translateY(-1px); }

    /* Results */
    .quiz-results { text-align: center; padding: 12px 0; }

    .result-score {
      font-family: 'Inter', sans-serif;
      font-size: 3.75rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 8px;
    }
    .result-score .denom { color: var(--kw); }

    .result-msg {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .result-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-retake {
      padding: 11px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-retake:hover { border-color: var(--text-muted); color: var(--text-primary); }

    .btn-mark-complete {
      padding: 11px 22px;
      border-radius: 8px;
      border: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-mark-complete:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Coming soon panel */
    .coming-soon-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 56px 28px;
      text-align: center;
    }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 18px; }
    .coming-soon-title {
      font-family: 'Inter', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .coming-soon-msg {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- Language Toggle -->
<div id="lang-toggle" role="group" aria-label="Select language">
  <button class="lang-btn active" data-lang="en" onclick="switchLang('en')" aria-pressed="true">🇺🇸 EN</button>
  <button class="lang-btn" data-lang="es" onclick="switchLang('es')" aria-pressed="false">🇪🇸 ES</button>
  <button class="lang-btn" data-lang="pt" onclick="switchLang('pt')" aria-pressed="false">🇧🇷 PT</button>
  <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')" aria-pressed="false">🇷🇺 RU</button>
</div>

<!-- WIDA Badge -->
<div id="wida-badge">
  <div class="wida-dot"></div>
  <span>WIDA L3 · Developing</span>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-container">
    <div class="dash-header">
      <h1 class="dash-title">Ready for <span class="accent">What's Next</span></h1>
      <p class="dash-subtitle">Your roadmap to digital life after high school.</p>
    </div>

    <div class="progress-panel">
      <div class="progress-panel-header">
        <span class="progress-panel-label">Course Progress</span>
        <span class="progress-panel-count" id="progress-count">0 of 5 Units Completed</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <main aria-label="Course Units">
      <div class="unit-grid" id="unit-grid"></div>
    </main>
  </div>
</div>

<!-- Unit View -->
<div id="unit-view">
  <div class="unit-container" id="unit-container"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   UNIT DATA
══════════════════════════════════════════════ */
const UNITS = [
  {
    id: 1,
    icon: '🪪',
    accent: '#4338CA',
    accentRgb: '67, 56, 202',
    kwColor: '#A78BFA',
    title: 'Digital Identity',

function t(key, ...args) {
  const val = (UI[LANG.current] || UI.en)[key] ?? UI.en[key];
  return typeof val === 'function' ? val(...args) : (val ?? '');
}

function currentUnits() {
  const tr = UNIT_TRANSLATIONS[LANG.current];
  if (!tr) return UNITS;
  return UNITS.map(unit => {
    const translated = tr.find(u => u.id === unit.id);
    return translated ? { ...unit, ...translated } : unit;
  });
}

function switchLang(lang) {
  LANG.current = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    const isActive = btn.dataset.lang === lang;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  const unitView = document.getElementById('unit-view');
  if (unitView.classList.contains('active') && state.currentUnitId) {
    renderUnitView(currentUnits().find(u => u.id === state.currentUnitId));
  } else {
    renderDashboard();
  }
}

let _tipCounter = 0;
function applyTooltips() {
  document.querySelectorAll('.kw').forEach(kw => {
    if (kw.querySelector('.kw-tooltip')) return; // already applied
    const term = kw.textContent.trim();
    const def  = DEFINITIONS[term] || DEFINITIONS[term.toLowerCase()];
    if (!def) return;
    const id = 'tip-' + (++_tipCounter);
    kw.setAttribute('tabindex', '0');
    kw.setAttribute('role', 'term');
    kw.setAttribute('aria-describedby', id);
    const tip = document.createElement('span');
    tip.className = 'kw-tooltip';
    tip.id = id;
    tip.setAttribute('role', 'tooltip');
    tip.textContent = def;
    kw.appendChild(tip);
  });
}

        {question:'Relaciona cada elemento de LinkedIn con lo que hace por ti.', options:['Foto de Perfil \u2192 Primera impresi\u00f3n \u00b7 Titular \u2192 Tu presentaci\u00f3n \u00b7 Habilidades \u2192 Avaladas por conexiones','Titular \u2192 Primera impresi\u00f3n \u00b7 Foto \u2192 Tu presentaci\u00f3n \u00b7 Habilidades \u2192 Avaladas por conexiones','Habilidades \u2192 Primera impresi\u00f3n \u00b7 Titular \u2192 Tu presentaci\u00f3n \u00b7 Foto \u2192 Avaladas por conexiones','Foto \u2192 Primera impresi\u00f3n \u00b7 Habilidades \u2192 Tu presentaci\u00f3n \u00b7 Titular \u2192 Avaladas por conexiones'], correct:0, feedbackCorrect:'&#10003; ¡Perfecto! Cada elemento de tu perfil de LinkedIn tiene una funci\u00f3n espec\u00edfica.', feedbackWrong:'Algunas respuestas no coinciden \u2014 Foto = primera impresi\u00f3n, Titular = tu presentaci\u00f3n, Habilidades = avaladas por conexiones.'},
        {question:'¿Cu\u00e1l es el mejor asunto para un correo pidiendo un trabajo de verano en una caf\u00e9?', options:['"hola, \u00bfhay trabajo?"','"Solicitud \u2013 Trabajo de Verano en Caf\u00e9 Local"','"¡por favor quiero trabajar aqu\u00ed!!!"','"RE: Oferta de trabajo (no recuerdo el t\u00edtulo)"'], correct:1, feedbackCorrect:'&#10003; ¡Bien! Un asunto corto y espec\u00edfico se abre m\u00e1s f\u00e1cilmente.', feedbackWrong:'No exactamente. Un asunto profesional debe ser claro, espec\u00edfico y con may\u00fasculas correctas. La opci\u00f3n B es la mejor.'},
        {question:'Un oficial de admisiones te busca en Google y encuentra fotos que prefieres no compartir. ¿Cu\u00e1l es la mejor respuesta?', options:['Ignorarlo \u2014 probablemente no les importar\u00e1','Eliminar todas tus redes sociales de inmediato','Poner las cuentas personales en privado y crear un LinkedIn p\u00fablico s\u00f3lido','Pedirle a tus amigos que te quiten de todo'], correct:2, feedbackCorrect:'&#10003; Correcto. Una cuenta personal privada m\u00e1s un LinkedIn s\u00f3lido te da control sobre lo que los dem\u00e1s ven.', feedbackWrong:'No exactamente \u2014 la respuesta es C. No tienes que eliminar todo; solo controla lo que es p\u00fablico.'}

    {
      id:2, title:'IA y T\u00fa', description:'Aprende a usar herramientas de IA de forma responsable, detecta contenido generado por IA y protege tu integridad acad\u00e9mica.',
      chunks:[
        {title:'Usar ChatGPT de Forma Responsable', content:'Herramientas de IA como <span class="kw">ChatGPT</span> pueden ayudarte a generar ideas, hacer esquemas y editar \u2014 pero son un punto de partida, no un producto terminado. Siempre <span class="kw">verifica</span> la informaci\u00f3n de la IA porque puede afirmar cosas incorrectas con confianza. Usa la IA para mejorar tu pensamiento, no para reemplazarlo.'},
        {title:'Integridad Acad\u00e9mica e IA', content:'La mayor\u00eda de las escuelas tienen pol\u00edticas de <span class="kw">integridad acad\u00e9mica</span> sobre el uso de IA. Usar IA para escribir un ensayo completo y presentarlo como tuyo se considera <span class="kw">deshonestidad acad\u00e9mica</span>. La pregunta clave: \u00bfAprender algo, o solo dej\u00e9 que una m\u00e1quina pensara por m\u00ed? Tu crecimiento importa m\u00e1s que la calificaci\u00f3n.'},
        {title:'Detectar Contenido Generado por IA', content:'El texto de IA suele ser fluido, vago y lleno de frases gen\u00e9ricas como \u201ces importante notar\u201d. Detectar contenido <span class="kw">generado por IA</span> es una habilidad cr\u00edtica \u2014 empleadores, profesores y periodistas est\u00e1n aprendiendo a reconocerlo.'},
        {title:'Escribir Mejores Instrucciones para la IA', content:'La calidad de lo que la IA te da depende de lo que pides. Instrucci\u00f3n d\u00e9bil: \u201cEscr\u00edbeme un ensayo\u201d. Instrucci\u00f3n fuerte: \u201cEscr\u00edbeme un ensayo argumentativo de 3 p\u00e1rrafos sobre por qu\u00e9 los a\u00f1os de pausa son valiosos, con dos ejemplos reales\u201d. S\u00e9 espec\u00edfico sobre formato, audiencia, extensi\u00f3n y tono.'},
        {title:'Herramientas de IA que Debes Conocer', content:'M\u00e1s all\u00e1 de ChatGPT: <span class="kw">Grammarly</span> ayuda con gram\u00e1tica y tono, <span class="kw">Google NotebookLM</span> resume investigaciones y <span class="kw">Otter.ai</span> transcribe reuniones. La alfabetizaci\u00f3n en IA es ahora una habilidad laboral \u2014 saber qu\u00e9 herramienta usar para cada tarea te hace destacar.'}
      ],
      quiz:[
        {question:'¿Cu\u00e1l es el mayor riesgo de entregar trabajo generado por IA como propio?', options:['Tarda demasiado en generarse','Viola las pol\u00edticas de integridad acad\u00e9mica y te pierdes el aprendizaje real','La IA siempre se equivoca, as\u00ed que no tendr\u00e1 sentido','Los maestros no pueden notarlo'], correct:1, feedbackCorrect:'&#10003; Entregar trabajo de IA como propio se considera deshonesto en la mayor\u00eda de las escuelas \u2014 y te pierdes la oportunidad de desarrollar la habilidad t\u00fa mismo.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Entregar trabajo de IA como propio es deshonesto y te impide aprender.'},
        {question:'¿Cu\u00e1l es una se\u00f1al de que el contenido fue generado por IA?', options:['Tiene errores ortogr\u00e1ficos','Usa historias personales y detalles espec\u00edficos','Es demasiado fluido, vago y usa frases gen\u00e9ricas como \u201ces importante notar\u201d','Es muy corto'], correct:2, feedbackCorrect:'&#10003; La escritura de IA tiende a ser pulida pero gen\u00e9rica \u2014 evita los detalles espec\u00edficos y usa frases de relleno.', feedbackWrong:'No exactamente \u2014 la respuesta es C. La escritura de IA tiende a ser pulida pero gen\u00e9rica, con frases de relleno.'},
        {question:'¿Qu\u00e9 hace que una instrucci\u00f3n para IA sea buena?', options:['Hacerla lo m\u00e1s corta posible','Ser espec\u00edfico sobre formato, audiencia, extensi\u00f3n y tono','Pedirle a la IA que haga todo por ti','Usar solo una palabra'], correct:1, feedbackCorrect:'&#10003; Las instrucciones espec\u00edficas producen resultados espec\u00edficos. M\u00e1s contexto = mejor resultado.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Las instrucciones espec\u00edficas producen resultados espec\u00edficos.'},
        {question:'¿C\u00f3mo debes tratar la informaci\u00f3n de la IA cuando investigas?', options:['Copiarla y pegarla directamente en tu tarea','Asumir que siempre es precisa','Usarla como punto de partida y verificar todo','Evitar usar IA para investigaci\u00f3n'], correct:2, feedbackCorrect:'&#10003; La IA puede generar informaci\u00f3n falsa con confianza. Siempre verifica con fuentes confiables.', feedbackWrong:'No exactamente \u2014 la respuesta es C. La IA puede equivocarse. Siempre verifica con fuentes confiables.'},
        {question:'¿Cu\u00e1l es una herramienta de IA real usada en entornos profesionales?', options:['CorrectorBot 3000','Otter.ai para transcribir reuniones y conferencias','CalificameIA','EnsayoAuto Pro'], correct:1, feedbackCorrect:'&#10003; Otter.ai es una herramienta profesional ampliamente usada que transcribe conversaciones en tiempo real.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Otter.ai transcribe conversaciones en tiempo real y es ampliamente usada en entornos profesionales.'}
      ]
    },
    {
      id:3, title:'Dinero y Vida Digital', description:'Domina los conceptos b\u00e1sicos de la banca, el cr\u00e9dito y c\u00f3mo mantenerte seguro frente a estafas en el mundo digital.',
      chunks:[
        {title:'Aplicaciones Bancarias y Dinero Digital', content:'La mayor\u00eda de las operaciones bancarias hoy ocurren en tu tel\u00e9fono. Aplicaciones como <span class="kw">Cash App</span>, <span class="kw">Venmo</span> y <span class="kw">Zelle</span> te permiten enviar y recibir dinero al instante \u2014 pero los errores son dif\u00edciles de revertir. Abre una cuenta corriente real en un banco o cooperativa de cr\u00e9dito antes de depender solo de las apps de pago.'},
        {title:'Entender los Puntajes de Cr\u00e9dito', content:'Tu <span class="kw">puntaje de cr\u00e9dito</span> es un n\u00famero entre <span class="kw">300 y 850</span> que indica a los prestamistas qu\u00e9 tan confiable eres con el dinero. Construyes cr\u00e9dito abriendo una <span class="kw">tarjeta de cr\u00e9dito inicial</span>, manteniendo tu saldo bajo y pagando a tiempo cada mes.'},
        {title:'Conciencia sobre Estafas', content:'Los estafadores se dirigen a los j\u00f3venes porque son nuevos en manejar dinero en l\u00ednea. Estafas comunes incluyen correos de <span class="kw">phishing</span> que se hacen pasar por tu escuela o banco. La regla: si se siente urgente o pide informaci\u00f3n personal de la nada \u2014 det\u00e9nete y verifica antes de actuar.'},
        {title:'Conceptos B\u00e1sicos de Finanzas Personales', content:'Vivir solo significa rastrear cada d\u00f3lar. La regla <span class="kw">50/30/20</span>: 50% para necesidades como renta y comida, 30% para gustos como salir a comer, y 20% para ahorros y pago de deudas. Construye un <span class="kw">fondo de emergencia</span> de al menos $500.'},
        {title:'Proteger Tu Identidad Financiera', content:'Nunca compartas tu <span class="kw">n\u00famero de seguro social</span>, usuario bancario o n\u00fameros de tarjeta por mensaje de texto, correo o tel\u00e9fono. Activa las alertas de transacciones en tu app bancaria. Consulta tu informe de cr\u00e9dito gratis una vez al a\u00f1o en <span class="kw">AnnualCreditReport.com</span>.'}
      ],
      quiz:[
        {question:'¿Qu\u00e9 afecta tu puntaje de cr\u00e9dito?', options:['Solo tu capacidad de comprar boletos de conciertos','Tu capacidad de rentar apartamentos, obtener pr\u00e9stamos y a veces conseguir empleo','Solo a personas mayores de 40 a\u00f1os','Nada hasta que cumplas 30 a\u00f1os'], correct:1, feedbackCorrect:'&#10003; Los puntajes de cr\u00e9dito importan m\u00e1s de lo que crees \u2014 propietarios, prestamistas y algunos empleadores los revisan.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Los puntajes de cr\u00e9dito los revisan propietarios, prestamistas y algunos empleadores.'},
        {question:'¿Cu\u00e1l es la regla presupuestaria 50/30/20?', options:['50% ahorros, 30% necesidades, 20% gustos','50% necesidades, 30% gustos, 20% ahorros y deudas','50% gustos, 30% ahorros, 20% impuestos','50% comida, 30% renta, 20% diversi\u00f3n'], correct:1, feedbackCorrect:'&#10003; La regla 50/30/20: la mitad para lo esencial, un tercio para estilo de vida y una quinta parte para ahorros y deudas.', feedbackWrong:'No exactamente \u2014 la respuesta es B. 50% necesidades, 30% gustos, 20% ahorros y pago de deudas.'},
        {question:'¿Cu\u00e1l es una se\u00f1al de alerta de una estafa?', options:['Una empresa pidi\u00e9ndote que apliques a trav\u00e9s de su sitio oficial','Un mensaje que crea presi\u00f3n urgente y pide informaci\u00f3n personal de inmediato','Un banco enviando un estado de cuenta mensual a tu domicilio','Una oferta de trabajo en LinkedIn con un nombre de empresa real'], correct:1, feedbackCorrect:'&#10003; La urgencia y las peticiones de informaci\u00f3n personal de la nada son las mayores se\u00f1ales de estafa.', feedbackWrong:'No exactamente \u2014 la respuesta es B. La urgencia y las peticiones de informaci\u00f3n personal son las mayores se\u00f1ales de estafa.'},
        {question:'¿Qu\u00e9 debes hacer antes de depender de Venmo o Cash App como cuenta principal?', options:['Nada, las apps de pago son todo lo que necesitas','Abrir primero una cuenta corriente real en un banco o cooperativa de cr\u00e9dito','Pedirle a tus padres que manejen tu dinero','Esperar hasta conseguir tu primer trabajo de tiempo completo'], correct:1, feedbackCorrect:'&#10003; Las apps de pago son convenientes pero no sustituyen una cuenta bancaria real con protecci\u00f3n FDIC.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Las apps de pago son convenientes pero no sustituyen una cuenta bancaria real.'},
        {question:'¿D\u00f3nde puedes revisar tu informe de cr\u00e9dito gratis una vez al a\u00f1o?', options:['Solo en CreditKarma.com','En la oficina de tu consejero escolar','AnnualCreditReport.com','Tienes que pagar para ver tu informe de cr\u00e9dito'], correct:2, feedbackCorrect:'&#10003; AnnualCreditReport.com es el sitio oficial autorizado federalmente para tu informe de cr\u00e9dito gratuito anual.', feedbackWrong:'No exactamente \u2014 la respuesta es C. AnnualCreditReport.com es el sitio oficial para tu informe de cr\u00e9dito gratuito.'}
      ]
    },
    {
      id:4, title:'Comunicaci\u00f3n en el Trabajo', description:'Aprende a comunicarte de manera profesional usando las herramientas, el tono y las habilidades que los lugares de trabajo modernos esperan.',
      chunks:[
        {title:'Slack, Teams y Mensajer\u00eda Laboral', content:'La mayor\u00eda de los lugares de trabajo modernos usan herramientas como <span class="kw">Slack</span> o <span class="kw">Microsoft Teams</span>. Mant\u00e9n los mensajes claros y concisos. Usa los canales para los temas correctos, no env\u00edes preguntas urgentes a medianoche, y siempre lee el hilo existente antes de intervenir.'},
        {title:'Tono Profesional en la Escritura', content:'El tono en la comunicaci\u00f3n escrita es f\u00e1cil de malinterpretar. Un mensaje casual puede leerse como grosero para un gerente. Reemplaza \u201cok\u201d informal por \u201cde acuerdo\u201d, evita las may\u00fasculas, y agrega \u201cpor favor\u201d y \u201cgracias\u201d m\u00e1s de lo que crees necesario.'},
        {title:'Etiqueta en las Reuniones', content:'Ya sea en persona o por Zoom, llegar preparado es obligatorio. Conoce la agenda antes de que comience la <span class="kw">reuni\u00f3n</span>. Mant\u00e9n la c\u00e1mara encendida durante las reuniones virtuales. Si tienes una pregunta, an\u00f3tala. Y da seguimiento a los <span class="kw">puntos de acci\u00f3n</span> que te asignaron.'},
        {title:'Dar y Recibir Retroalimentaci\u00f3n', content:'La <span class="kw">retroalimentaci\u00f3n</span> en el trabajo no es personal \u2014 es profesional. Al recibirla, escucha completamente antes de responder y agradece a la persona. Al darla, usa el marco \u201cNoté / Siento / Sugiero\u201d para mantenerla constructiva. El objetivo siempre es mejorar, no culpar.'},
        {title:'Leer el Ambiente (Profesionalmente)', content:'Cada lugar de trabajo tiene una cultura no escrita. Pasa tus primeras semanas observando m\u00e1s que hablando. Nota c\u00f3mo se comunica tu gerente y adapta ese estilo. No seas la persona m\u00e1s ruidosa de la sala hasta que hayas ganado la confianza para ser escuchado.'}
      ],
      quiz:[
        {question:'¿Cu\u00e1l es la mejor pr\u00e1ctica al unirte a un canal de Slack o Teams?', options:['Enviar un mensaje de inmediato para que la gente sepa que est\u00e1s ah\u00ed','Leer primero el hilo existente para no preguntar algo que ya fue respondido','Enviar un mensaje privado a todos individualmente','Publicar un saludo en cada canal al que te unes'], correct:1, feedbackCorrect:'&#10003; Leer el hilo antes de publicar muestra respeto por el tiempo de los dem\u00e1s y te ayuda a contribuir con algo \u00fatil.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Leer el hilo antes de publicar muestra respeto y te ayuda a contribuir con algo \u00fatil.'},
        {question:'¿Por qu\u00e9 es importante el tono profesional en los mensajes escritos?', options:['Impresiona a la gente con vocabulario sofisticado','Los mensajes escritos carecen de tono de voz y expresiones faciales, por lo que la elecci\u00f3n de palabras tiene m\u00e1s peso','Los gerentes solo leen correos formales','Te calificar\u00e1n por la gram\u00e1tica'], correct:1, feedbackCorrect:'&#10003; Sin se\u00f1ales vocales, las palabras casuales pueden leerse f\u00e1cilmente como condescendientes o poco profesionales.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Sin se\u00f1ales vocales, la elecci\u00f3n de palabras tiene mucho m\u00e1s peso.'},
        {question:'¿Qu\u00e9 debes hacer cuando recibes retroalimentaci\u00f3n de un gerente?', options:['Ponerte a la defensiva y explicar por qu\u00e9 lo hiciste a tu manera','Ignorarla si no est\u00e1s de acuerdo','Escuchar completamente, agradecerle y hacer una pregunta aclaratoria si es necesario','Darle retroalimentaci\u00f3n a su vez de inmediato'], correct:2, feedbackCorrect:'&#10003; Recibir retroalimentaci\u00f3n con gracia es una de las habilidades profesionales m\u00e1s valoradas.', feedbackWrong:'No exactamente \u2014 la respuesta es C. Escucha completamente, agradece y haz preguntas aclaratorias si es necesario.'},
        {question:'¿Cu\u00e1l es un buen comportamiento en una videollamada?', options:['Apagar la c\u00e1mara y hacer m\u00faltiples tareas','Llegar cinco minutos tarde porque es virtual','Mantener la c\u00e1mara encendida y revisar la agenda de antemano','Enviar mensajes a un compa\u00f1ero durante el presentador'], correct:2, feedbackCorrect:'&#10003; Participar con la c\u00e1mara encendida indica compromiso, y llegar preparado muestra respeto por todos en la reuni\u00f3n.', feedbackWrong:'No exactamente \u2014 la respuesta es C. C\u00e1mara encendida + llegar preparado = respeto y compromiso.'},
        {question:'¿Cu\u00e1l es la jugada m\u00e1s inteligente en tus primeras semanas en un nuevo trabajo?', options:['Hacer grandes cambios de inmediato para demostrar iniciativa','Hablar lo m\u00e1s posible para que la gente te note','Observar la cultura del lugar de trabajo antes de expresar opiniones fuertes','Evitar toda comunicaci\u00f3n en equipo hasta que te sientas seguro'], correct:2, feedbackCorrect:'&#10003; Cada lugar de trabajo tiene una cultura no escrita. Escuchar y observar primero te ayuda a contribuir efectivamente.', feedbackWrong:'No exactamente \u2014 la respuesta es C. Escuchar y observar primero te ayuda a entender c\u00f3mo contribuir efectivamente.'}
      ]
    },
    {
      id:5, title:'Portales de Universidad y Carrera', description:'Navega las herramientas reales \u2014 FAFSA, solicitudes de empleo, entrevistas y cartas de oferta \u2014 con confianza.',
      chunks:[
        {title:'La FAFSA Explicada', content:'La <span class="kw">FAFSA</span> \u2014 <span class="kw">Solicitud Gratuita de Ayuda Federal para Estudiantes</span> \u2014 es el formulario para acceder a becas federales, pr\u00e9stamos y programas de <span class="kw">trabajo-estudio</span>. Se abre el 1 de octubre y debes enviarla lo antes posible. Incluso si crees que no calificar\u00e1s, siempre aplica.'},
        {title:'Navegar Solicitudes de Empleo', content:'La mayor\u00eda de las solicitudes se env\u00edan a trav\u00e9s de portales como <span class="kw">Indeed</span>, <span class="kw">LinkedIn</span> o el sitio web de la empresa. Adapta tu curr\u00edculum y carta de presentaci\u00f3n para cada solicitud. Aplica aunque no cumplas el 100% de los requisitos. Haz seguimiento con un correo breve 5-7 d\u00edas despu\u00e9s.'},
        {title:'Preparaci\u00f3n para Entrevistas', content:'Investiga la empresa antes de tu entrevista. Practica con el <span class="kw">m\u00e9todo STAR</span>: Situaci\u00f3n, Tarea, Acci\u00f3n, Resultado. Prepara 2-3 preguntas para hacerle al entrevistador. Viste un nivel m\u00e1s formal que el c\u00f3digo de vestimenta diario y plan\u00e9a llegar 10 minutos antes.'},
        {title:'Entender las Cartas de Oferta', content:'Una <span class="kw">carta de oferta</span> es m\u00e1s que solo un n\u00famero de salario. L\u00e9ela cuidadosamente: fecha de inicio, t\u00edtulo del trabajo, salario, beneficios y pol\u00edtica de vacaciones. Nunca te sientas presionado a aceptar de inmediato \u2014 es profesional pedir 24-48 horas para revisar.'},
        {title:'Comparar Ofertas de Ayuda Financiera', content:'Cada universidad enviar\u00e1 una carta de oferta de ayuda financiera. Estas mezclan <span class="kw">becas</span> (dinero gratuito) con <span class="kw">pr\u00e9stamos</span> (dinero que debes devolver). Siempre resta los <span class="kw">pr\u00e9stamos</span> para ver tu costo real. Usa la <span class="kw">Calculadora de Precio Neto</span> de cada escuela para comparar.'}
      ],
      quiz:[
        {question:'¿Qu\u00e9 es la FAFSA y por qu\u00e9 importa?', options:['Un examen de admisi\u00f3n universitaria del 11\u00b0 grado','El formulario federal que determina tu elegibilidad para becas, pr\u00e9stamos y trabajo-estudio','Una solicitud de beca solo para universidades privadas','Un formulario que llenas despu\u00e9s de graduarte para pagar pr\u00e9stamos'], correct:1, feedbackCorrect:'&#10003; La FAFSA es la puerta de entrada a la ayuda financiera federal \u2014 env\u00edala temprano y cada a\u00f1o que est\u00e9s inscrito.', feedbackWrong:'No exactamente \u2014 la respuesta es B. La FAFSA es la puerta de entrada a la ayuda financiera federal.'},
        {question:'¿Qu\u00e9 debes hacer al leer una descripci\u00f3n de trabajo antes de aplicar?', options:['Solo revisar el t\u00edtulo del trabajo y el salario','Adaptar el lenguaje de tu curr\u00edculum a las palabras espec\u00edficas de la publicaci\u00f3n','Aplicar con el mismo curr\u00edculum a todos los trabajos','Esperar hasta cumplir el 100% de los requisitos antes de aplicar'], correct:1, feedbackCorrect:'&#10003; Adaptar tu solicitud al lenguaje espec\u00edfico de la descripci\u00f3n del trabajo te ayuda a destacar y pasar los filtros autom\u00e1ticos.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Adaptar tu solicitud al lenguaje de la publicaci\u00f3n te ayuda a destacar.'},
        {question:'¿Para qu\u00e9 te ayuda el m\u00e9todo STAR en una entrevista?', options:['Recordar el nombre de tu entrevistador','Estructurar tus respuestas usando Situaci\u00f3n, Tarea, Acci\u00f3n, Resultado','Decidir qu\u00e9 ropa ponerte','Calcular tu salario ideal'], correct:1, feedbackCorrect:'&#10003; STAR le da a tus respuestas un inicio, desarrollo y fin claros \u2014 haci\u00e9ndote sonar preparado y cre\u00edble.', feedbackWrong:'No exactamente \u2014 la respuesta es B. STAR le da estructura a tus respuestas: Situaci\u00f3n, Tarea, Acci\u00f3n, Resultado.'},
        {question:'¿Cu\u00e1l es lo m\u00e1s importante que debes verificar en una carta de oferta de ayuda financiera?', options:['La mascota y los colores de la escuela','La diferencia entre becas (dinero gratuito) y pr\u00e9stamos (dinero que debes devolver)','Si tu amigo recibi\u00f3 la misma oferta','La extensi\u00f3n de la carta'], correct:1, feedbackCorrect:'&#10003; Muchos estudiantes aceptan pr\u00e9stamos creyendo que son becas. Siempre resta los pr\u00e9stamos para ver tu costo real.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Siempre identifica y resta los pr\u00e9stamos para ver tu costo real de la universidad.'},
        {question:'¿Es aceptable pedir tiempo antes de aceptar una oferta de trabajo?', options:['No, debes decidir de inmediato o retirar\u00e1n la oferta','S\u00ed, pedir 24-48 horas para revisar es completamente profesional y esperado','Solo si tienes otra oferta en mano','Solo para pasant\u00edas, no para trabajos de tiempo completo'], correct:1, feedbackCorrect:'&#10003; Los empleadores esperan que los candidatos tomen tiempo para revisar. Pedir 24-48 horas es est\u00e1ndar y profesional.', feedbackWrong:'No exactamente \u2014 la respuesta es B. Pedir 24-48 horas para revisar una oferta es completamente profesional y esperado.'}
      ]
    }
  ],
  pt: [
    {
      id:1, title:'Identidade Digital', description:'Construa uma presen\u00e7a online que trabalhe para voc\u00ea.',
      chunks:[
        {title:'Quem Voc\u00ea \u00c9 Online?', content:'Sua <span class="kw">identidade digital</span> \u00e9 tudo que empregadores e faculdades v\u00eaem antes de te conhecer. Inclui suas <span class="kw">redes sociais</span>, seu <span class="kw">endere\u00e7o de e-mail</span>, seu <span class="kw">perfil no LinkedIn</span> e tudo que aparece quando algu\u00e9m pesquisa seu nome no Google.'},
        {title:'No\u00e7\u00f5es B\u00e1sicas de Curr\u00edculo', content:'Um <span class="kw">curr\u00edculo</span> \u00e9 sua <span class="kw">primeira impress\u00e3o</span> no papel. Mantenha em <span class="kw">uma p\u00e1gina</span>, use <span class="kw">verbos de a\u00e7\u00e3o</span> fortes e inclua educa\u00e7\u00e3o, experi\u00eancia e habilidades. Projetos escolares e trabalho volunt\u00e1rio tamb\u00e9m contam.'},
        {title:'LinkedIn', content:'<span class="kw">LinkedIn</span> \u00e9 sua <span class="kw">presen\u00e7a digital profissional</span>. Um perfil forte tem uma <span class="kw">foto de perfil clara</span>, um <span class="kw">t\u00edtulo</span> que descreve seus objetivos e conex\u00f5es com professores, mentores e conhecidos da fam\u00edlia.'},
        {title:'E-mail Profissional', content:'Seu <span class="kw">endere\u00e7o de e-mail</span> deve ser profissional. Sempre use um <span class="kw">assunto claro</span>, uma <span class="kw">sauda\u00e7\u00e3o formal</span> e uma <span class="kw">assinatura profissional</span>. Revise antes de enviar.'},
        {title:'Sua Pegada Digital', content:'Assuma que <span class="kw">empregadores e faculdades</span> v\u00e3o pesquisar seu nome. <span class="kw">Revise suas redes sociais</span>, exclua publica\u00e7\u00f5es inapropriadas e verifique suas <span class="kw">configura\u00e7\u00f5es de privacidade</span> regularmente.'}
      ],
      quiz:[
        {question:'O que torna um curr\u00edculo MAIS prov\u00e1vel de ser notado pelos empregadores?', options:['Usar uma fonte decorativa para se destacar','Incluir palavras-chave da descri\u00e7\u00e3o da vaga','Fazer com 3 p\u00e1ginas para cobrir toda a experi\u00eancia','Adicionar um design de fundo colorido'], correct:1, feedbackCorrect:'&#10003; Correto! Palavras-chave ajudam seu curr\u00edculo a passar pelos sistemas de triagem autom\u00e1tica que a maioria dos empregadores usa.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Palavras-chave da descri\u00e7\u00e3o da vaga ajudam seu curr\u00edculo a passar pelos filtros autom\u00e1ticos.'},
        {question:'Relacione cada elemento do LinkedIn com o que ele faz por voc\u00ea.', options:['Foto de Perfil \u2192 Primeira impress\u00e3o \u00b7 T\u00edtulo \u2192 Sua apresenta\u00e7\u00e3o \u00b7 Habilidades \u2192 Endossadas por conex\u00f5es','T\u00edtulo \u2192 Primeira impress\u00e3o \u00b7 Foto \u2192 Sua apresenta\u00e7\u00e3o \u00b7 Habilidades \u2192 Endossadas por conex\u00f5es','Habilidades \u2192 Primeira impress\u00e3o \u00b7 T\u00edtulo \u2192 Sua apresenta\u00e7\u00e3o \u00b7 Foto \u2192 Endossadas por conex\u00f5es','Foto \u2192 Primeira impress\u00e3o \u00b7 Habilidades \u2192 Sua apresenta\u00e7\u00e3o \u00b7 T\u00edtulo \u2192 Endossadas por conex\u00f5es'], correct:0, feedbackCorrect:'&#10003; Perfeito! Cada elemento do seu perfil do LinkedIn tem uma fun\u00e7\u00e3o espec\u00edfica.', feedbackWrong:'Alguns n\u00e3o coincidem \u2014 Foto = primeira impress\u00e3o, T\u00edtulo = sua apresenta\u00e7\u00e3o, Habilidades = endossadas por conex\u00f5es.'},
        {question:'Qual \u00e9 o melhor assunto para um e-mail pedindo emprego de ver\u00e3o em um caf\u00e9 local?', options:['"oi, tem vaga?"','"Candidatura \u2013 Emprego de Ver\u00e3o no Caf\u00e9 Local"','"por favor quero trabalhar a\u00ed!!!"','"RE: Vaga de emprego (n\u00e3o lembro o t\u00edtulo exato)"'], correct:1, feedbackCorrect:'&#10003; Otimo! Um assunto curto e espec\u00edfico \u00e9 aberto com mais facilidade.', feedbackWrong:'N\u00e3o exatamente. Um assunto profissional deve ser claro, espec\u00edfico e com mai\u00fasculas corretas. A op\u00e7\u00e3o B \u00e9 a melhor.'},
        {question:'Um oficial de admiss\u00f5es pesquisa seu nome e encontra fotos que voc\u00ea preferiria n\u00e3o compartilhar. Qual \u00e9 a melhor resposta?', options:['Ignorar \u2014 provavelmente n\u00e3o vai importar','Excluir todas as redes sociais imediatamente','Colocar contas pessoais no privado e criar um LinkedIn p\u00fablico forte','Pedir aos amigos que te desmarquem de tudo'], correct:2, feedbackCorrect:'&#10003; Correto. Uma conta pessoal privada mais um LinkedIn forte te d\u00e1 controle sobre o que os outros v\u00eaem.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 C. Voc\u00ea n\u00e3o precisa deletar tudo; s\u00f3 controle o que \u00e9 p\u00fablico.'}
      ]
    },
    {
      id:2, title:'Ferramentas de IA e Voc\u00ea', description:'Aprenda a usar ferramentas de IA de forma respons\u00e1vel, identifique conte\u00fado gerado por IA e proteja sua integridade acad\u00eamica.',
      chunks:[
        {title:'Usando o ChatGPT de Forma Respons\u00e1vel', content:'Ferramentas de IA como <span class="kw">ChatGPT</span> podem ajudar a gerar ideias, fazer esbo\u00e7os e editar \u2014 mas s\u00e3o um ponto de partida, n\u00e3o um produto acabado. Sempre <span class="kw">verifique</span> as informa\u00e7\u00f5es da IA pois ela pode afirmar coisas incorretas com confian\u00e7a. Use a IA para aprimorar seu pensamento, n\u00e3o para substitui-lo.'},
        {title:'Integridade Acad\u00eamica e IA', content:'A maioria das escolas tem pol\u00edticas de <span class="kw">integridade acad\u00eamica</span> sobre o uso de IA. Usar IA para escrever um ensaio inteiro e entreg\u00e1-lo como seu \u00e9 considerado <span class="kw">desonestidade acad\u00eamica</span>. A pergunta-chave: aprendi algo, ou s\u00f3 deixei a m\u00e1quina pensar por mim? Seu crescimento vale mais do que a nota.'},
        {title:'Identificando Conte\u00fado Gerado por IA', content:'Textos de IA tendem a ser excessivamente suaves, vagos e cheios de frases gen\u00e9ricas como \u201c\u00e9 importante notar\u201d. Identificar conte\u00fado <span class="kw">gerado por IA</span> est\u00e1 se tornando uma habilidade essencial \u2014 empregadores, professores e jornalistas est\u00e3o aprendendo a reconhec\u00ea-lo.'},
        {title:'Escrevendo Prompts Melhores', content:'A qualidade do que a IA gera depende do que voc\u00ea pede. Prompt fraco: \u201cEscreva um ensaio\u201d. Prompt forte: \u201cEscreva um ensaio argumentativo de 3 par\u00e1grafos sobre por que anos sabáticos s\u00e3o valiosos, usando dois exemplos reais\u201d. Seja espec\u00edfico sobre formato, p\u00fablico, extens\u00e3o e tom.'},
        {title:'Ferramentas de IA que Voc\u00ea Deve Conhecer', content:'Al\u00e9m do ChatGPT: <span class="kw">Grammarly</span> ajuda com gram\u00e1tica e tom, <span class="kw">Google NotebookLM</span> resume pesquisas e <span class="kw">Otter.ai</span> transcreve reuni\u00f5es. Saber qual ferramenta usar para cada tarefa faz voc\u00ea se destacar desde o primeiro dia.'}
      ],
      quiz:[
        {question:'Qual \u00e9 o maior risco de entregar trabalho gerado por IA como pr\u00f3prio?', options:['Demora muito para gerar','Viola as pol\u00edticas de integridade acad\u00eamica e voc\u00ea perde a aprendizagem real','A IA \u00e9 sempre errada ent\u00e3o n\u00e3o far\u00e1 sentido','Professores n\u00e3o conseguem perceber'], correct:1, feedbackCorrect:'&#10003; Entregar trabalho de IA como pr\u00f3prio \u00e9 considerado desonesto na maioria das escolas \u2014 e voc\u00ea perde a chance de desenvolver a habilidade.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Entregar trabalho de IA como pr\u00f3prio \u00e9 desonesto e voc\u00ea perde a chance de aprender.'},
        {question:'Qual destes \u00e9 um sinal de que o conte\u00fado pode ter sido gerado por IA?', options:['Tem erros de ortografia','Usa hist\u00f3rias pessoais e detalhes espec\u00edficos','\u00c9 excessivamente suave, vago e usa frases gen\u00e9ricas como \u201c\u00e9 importante notar\u201d','\u00c9 muito curto'], correct:2, feedbackCorrect:'&#10003; Textos de IA tendem a ser pol\u00eddos mas gen\u00e9ricos \u2014 evitam especificidades e usam frases de preenchimento.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 C. Textos de IA tendem a ser pol\u00eddos mas gen\u00e9ricos, com frases de preenchimento.'},
        {question:'O que faz um prompt de IA ser bom?', options:['Ser o mais curto poss\u00edvel','Ser espec\u00edfico sobre formato, p\u00fablico, extens\u00e3o e tom','Pedir que a IA fa\u00e7a tudo por voc\u00ea','Usar apenas uma palavra'], correct:1, feedbackCorrect:'&#10003; Prompts espec\u00edficos geram resultados espec\u00edficos. Quanto mais contexto voc\u00ea der, mais \u00fatil ser\u00e1 o resultado.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Prompts espec\u00edficos geram resultados espec\u00edficos. Mais contexto = melhor resultado.'},
        {question:'Como voc\u00ea deve tratar informa\u00e7\u00f5es da IA ao pesquisar um assunto?', options:['Copiar e colar diretamente na tarefa','Assumir que \u00e9 sempre precisa','Usar como ponto de partida e verificar tudo','Evitar usar IA para pesquisa'], correct:2, feedbackCorrect:'&#10003; A IA pode gerar informa\u00e7\u00f5es falsas com confian\u00e7a. Sempre verifique os fatos com fontes confi\u00e1veis.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 C. A IA pode errar. Sempre verifique com fontes confi\u00e1veis.'},
        {question:'Qual dessas \u00e9 uma ferramenta de IA real usada em ambientes profissionais?', options:['CorretorBot 3000','Otter.ai para transcrever reuni\u00f5es e aulas','NoteIA','EnsaioAuto Pro'], correct:1, feedbackCorrect:'&#10003; O Otter.ai \u00e9 uma ferramenta profissional amplamente usada que transcreve conversas em tempo real.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. O Otter.ai transcreve conversas em tempo real e \u00e9 amplamente usado profissionalmente.'}
      ]
    },
    {
      id:3, title:'Dinheiro e Vida Digital', description:'Domine o b\u00e1sico de bancos, cr\u00e9dito e como se proteger de golpes no mundo digital.',
      chunks:[
        {title:'Aplicativos Banc\u00e1rios e Dinheiro Digital', content:'A maioria das opera\u00e7\u00f5es banc\u00e1rias hoje acontecem no celular. Apps como <span class="kw">Cash App</span>, <span class="kw">Venmo</span> e <span class="kw">Zelle</span> permitem enviar e receber dinheiro na hora \u2014 mas erros s\u00e3o dif\u00edceis de reverter. Abra uma conta corrente real em um banco ou cooperativa de cr\u00e9dito antes de depender s\u00f3 de apps de pagamento.'},
        {title:'Entendendo as Pontua\u00e7\u00f5es de Cr\u00e9dito', content:'Seu <span class="kw">score de cr\u00e9dito</span> \u00e9 um n\u00famero entre <span class="kw">300 e 850</span> que mostra aos credores o quanto voc\u00ea \u00e9 confi\u00e1vel com dinheiro. Voc\u00ea constr\u00f3i cr\u00e9dito abrindo um <span class="kw">cart\u00e3o de cr\u00e9dito inicial</span>, mantendo o saldo baixo e pagando em dia todo m\u00eas.'},
        {title:'Conscientiza\u00e7\u00e3o sobre Golpes', content:'Golpistas miram jovens porque eles s\u00e3o novos em gerenciar dinheiro online. Golpes comuns incluem e-mails de <span class="kw">phishing</span> fingindo ser seu banco ou escola. A regra: se parece urgente ou pede informa\u00e7\u00f5es pessoais do nada \u2014 pare e verifique antes de agir.'},
        {title:'No\u00e7\u00f5es B\u00e1sicas de Finan\u00e7as Pessoais', content:'Morar sozinho significa controlar cada real. A regra <span class="kw">50/30/20</span>: 50% para necessidades como aluguel e comida, 30% para desejos como sair ou streaming, e 20% para poupan\u00e7a e pagamento de d\u00edvidas. Forme um <span class="kw">fundo de emerg\u00eancia</span> de pelo menos R$500 antes de gastar no supérfluo.'},
        {title:'Protegendo Sua Identidade Financeira', content:'Nunca compartilhe seu <span class="kw">CPF</span>, login banc\u00e1rio ou n\u00fameros de cart\u00e3o por mensagem, e-mail ou telefone. Ative alertas de transa\u00e7\u00f5es no app do banco. Consulte seu relat\u00f3rio de cr\u00e9dito gratuitamente em <span class="kw">AnnualCreditReport.com</span> uma vez por ano (para quem est\u00e1 nos EUA).'}
      ],
      quiz:[
        {question:'O que seu score de cr\u00e9dito afeta?', options:['Apenas sua capacidade de comprar ingressos de show','Sua capacidade de alugar apartamentos, conseguir empr\u00e9stimos e \u00e0s vezes ser contratado','Apenas pessoas com mais de 40 anos','Nada at\u00e9 voc\u00ea completar 30 anos'], correct:1, feedbackCorrect:'&#10003; Scores de cr\u00e9dito importam mais do que a maioria dos jovens percebe \u2014 propriet\u00e1rios, credores e alguns empregadores os verificam.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Scores de cr\u00e9dito s\u00e3o verificados por propriet\u00e1rios, credores e at\u00e9 alguns empregadores.'},
        {question:'O que \u00e9 a regra or\u00e7ament\u00e1ria 50/30/20?', options:['50% poupan\u00e7a, 30% necessidades, 20% desejos','50% necessidades, 30% desejos, 20% poupan\u00e7a e d\u00edvidas','50% desejos, 30% poupan\u00e7a, 20% impostos','50% comida, 30% aluguel, 20% diversão'], correct:1, feedbackCorrect:'&#10003; A regra 50/30/20: metade da renda para o essencial, cerca de um ter\u00e7o para estilo de vida, e um quinto para poupan\u00e7a e d\u00edvidas.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. 50% necessidades, 30% desejos, 20% poupan\u00e7a e pagamento de d\u00edvidas.'},
        {question:'Qual destes \u00e9 um sinal de alerta de golpe?', options:['Uma empresa pedindo que voc\u00ea aplique pelo site oficial','Uma mensagem criando press\u00e3o urgente e pedindo informa\u00e7\u00f5es pessoais imediatamente','Um banco enviando extrato mensal para seu endere\u00e7o','Uma vaga no LinkedIn com nome de empresa real'], correct:1, feedbackCorrect:'&#10003; Urg\u00eancia e pedidos de informa\u00e7\u00f5es pessoais do nada s\u00e3o os maiores sinais de golpe. Institui\u00e7\u00f5es leg\u00edtimas n\u00e3o pressionam.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Urg\u00eancia e pedidos de informa\u00e7\u00f5es pessoais s\u00e3o os maiores sinais de golpe.'},
        {question:'O que voc\u00ea deve fazer antes de depender do Venmo ou Cash App como conta principal?', options:['Nada, apps de pagamento s\u00e3o tudo que voc\u00ea precisa','Abrir primeiro uma conta corrente real em um banco ou cooperativa de cr\u00e9dito','Pedir aos pais que gerenciem seu dinheiro','Esperar at\u00e9 conseguir seu primeiro emprego de tempo integral'], correct:1, feedbackCorrect:'&#10003; Apps de pagamento s\u00e3o convenientes mas n\u00e3o substituem uma conta banc\u00e1ria real com prote\u00e7\u00e3o e sem taxas.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Apps de pagamento n\u00e3o substituem uma conta banc\u00e1ria real.'},
        {question:'Onde voc\u00ea pode consultar seu relat\u00f3rio de cr\u00e9dito gratuitamente uma vez por ano (EUA)?', options:['Apenas em CreditKarma.com','No orientador da escola','AnnualCreditReport.com','Voc\u00ea precisa pagar para ver seu relat\u00f3rio de cr\u00e9dito'], correct:2, feedbackCorrect:'&#10003; AnnualCreditReport.com \u00e9 o site oficial autorizado pelo governo federal para acesso gratuito ao seu relat\u00f3rio de cr\u00e9dito anual.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 C. AnnualCreditReport.com \u00e9 o site oficial para seu relat\u00f3rio de cr\u00e9dito gratuito anual.'}
      ]
    },
    {
      id:4, title:'Comunica\u00e7\u00e3o no Trabalho', description:'Aprenda a se comunicar profissionalmente usando as ferramentas, o tom e as habilidades que os ambientes de trabalho modernos esperam.',
      chunks:[
        {title:'Slack, Teams e Mensagens de Trabalho', content:'A maioria dos ambientes de trabalho modernos usa ferramentas como <span class="kw">Slack</span> ou <span class="kw">Microsoft Teams</span>. Mantenha as mensagens claras e concisas. Use os canais para os t\u00f3picos certos, n\u00e3o envie perguntas urgentes \u00e0 meia-noite, e sempre leia o t\u00f3pico existente antes de intervir.'},
        {title:'Tom Profissional na Escrita', content:'Tom na comunica\u00e7\u00e3o escrita \u00e9 f\u00e1cil de errar porque n\u00e3o h\u00e1 express\u00e3o facial ou voz para ajudar. Uma mensagem casual para voc\u00ea pode parecer grossa para um gerente. Releia antes de enviar. Substitua \u201cok\u201d informal por uma resposta mais cuidadosa, evite caps lock, e use \u201cpor favor\u201d e \u201cobrigado\u201d mais do que acha necess\u00e1rio.'},
        {title:'Etiqueta em Reuni\u00f5es', content:'Seja presencial ou no Zoom, chegar preparado n\u00e3o \u00e9 opcional. Conhe\u00e7a a pauta antes da <span class="kw">reuni\u00e3o</span>. Mantenha a c\u00e2mera ligada em reuni\u00f5es virtuais. Se tiver uma d\u00favida, anote em vez de interromper. E sempre d\u00ea seguimento aos <span class="kw">itens de a\u00e7\u00e3o</span> que voc\u00ea foi atribu\u00eddo.'},
        {title:'Dar e Receber Feedback', content:'<span class="kw">Feedback</span> no trabalho n\u00e3o \u00e9 pessoal \u2014 \u00e9 profissional. Ao receber <span class="kw">feedback</span>, escute completamente antes de responder e agradeça \u00e0 pessoa. Ao dar <span class="kw">feedback</span>, use o modelo \u201cObservei / Sinto / Sugiro\u201d para mant\u00ea-lo construtivo. O objetivo \u00e9 sempre a melhoria, n\u00e3o a culpa.'},
        {title:'Lendo o Ambiente (Profissionalmente)', content:'Todo local de trabalho tem uma cultura n\u00e3o escrita. Passe suas primeiras semanas observando mais do que falando. Perceba como seu gerente se comunica e adapte esse estilo. N\u00e3o seja a pessoa mais barulhenta da sala at\u00e9 ter conquistado a confian\u00e7a para ser ouvido.'}
      ],
      quiz:[
        {question:'Qual \u00e9 a melhor pr\u00e1tica ao entrar em um canal do Slack ou Teams?', options:['Enviar uma mensagem imediatamente para que as pessoas saibam que voc\u00ea est\u00e1 l\u00e1','Ler o t\u00f3pico existente primeiro para n\u00e3o perguntar algo j\u00e1 respondido','Enviar uma mensagem privada para todos individualmente','Postar uma sauda\u00e7\u00e3o em cada canal que voc\u00ea entra'], correct:1, feedbackCorrect:'&#10003; Ler o t\u00f3pico antes de postar mostra respeito pelo tempo dos outros e te ajuda a contribuir com algo \u00fatil.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Ler o t\u00f3pico antes de postar mostra respeito e te ajuda a contribuir com algo \u00fatil.'},

    {
      id:5, title:'Portais de Faculdade e Carreira', description:'Navegue pelas ferramentas reais \u2014 FAFSA, candidaturas, prepara\u00e7\u00e3o para entrevistas e cartas de oferta \u2014 com confian\u00e7a.',
      chunks:[
        {title:'A FAFSA Explicada', content:'A <span class="kw">FAFSA</span> \u2014 <span class="kw">Free Application for Federal Student Aid</span> \u2014 \u00e9 o formul\u00e1rio para acessar aux\u00edlios federais, empr\u00e9stimos e programas de <span class="kw">trabalho-estudo</span> para a faculdade. Abre em 1\u00ba de outubro e voc\u00ea deve enviar o mais cedo poss\u00edvel. Mesmo que ache que n\u00e3o vai se qualificar, sempre inscreva-se.'},
        {title:'Navegando Candidaturas de Emprego', content:'A maioria das candidaturas \u00e9 enviada por portais como <span class="kw">Indeed</span>, <span class="kw">LinkedIn</span> ou o site da empresa. Adapte seu curr\u00edculo e carta de apresenta\u00e7\u00e3o para cada vaga. Candidate-se mesmo que n\u00e3o atenda 100% dos requisitos. Fa\u00e7a acompanhamento com um e-mail breve e profissional 5-7 dias depois.'},
        {title:'Prepara\u00e7\u00e3o para Entrevistas', content:'Pesquise a empresa antes da entrevista. Pratique respondendo perguntas comportamentais usando o <span class="kw">m\u00e9todo STAR</span>: Situa\u00e7\u00e3o, Tarefa, A\u00e7\u00e3o, Resultado. Prepare 2-3 perguntas para fazer ao entrevistador. Vista-se um n\u00edvel mais formal que o c\u00f3digo de vestimenta di\u00e1rio e planeje chegar 10 minutos antes.'},
        {title:'Entendendo Cartas de Oferta', content:'Uma <span class="kw">carta de oferta</span> \u00e9 mais do que s\u00f3 um sal\u00e1rio. Leia com aten\u00e7\u00e3o: data de in\u00edcio, cargo, sal\u00e1rio, benef\u00edcios e pol\u00edtica de f\u00e9rias. Nunca se sinta pressionado a aceitar imediatamente \u2014 \u00e9 completamente profissional pedir 24-48 horas para revisar.'},
        {title:'Comparando Ofertas de Aux\u00edlio Financeiro', content:'Se aceito em v\u00e1rias faculdades, cada uma enviar\u00e1 uma carta de aux\u00edlio financeiro. Elas misturam <span class="kw">bolsas</span> (dinheiro gratuito) com <span class="kw">empr\u00e9stimos</span> (dinheiro que voc\u00ea devolve). Sempre subtraia os <span class="kw">empr\u00e9stimos</span> para ver seu custo real. Use a <span class="kw">Calculadora de Pre\u00e7o L\u00edquido</span> de cada escola para comparar.'}
      ],
      quiz:[
        {question:'O que \u00e9 a FAFSA e por que ela importa?', options:['Um exame de admiss\u00e3o que voc\u00ea faz no 11\u00ba ano','O formul\u00e1rio federal que determina sua elegibilidade para bolsas, empr\u00e9stimos e aux\u00edlio de trabalho-estudo','Uma candidatura de bolsa apenas para universidades privadas','Um formul\u00e1rio que voc\u00ea preenche ap\u00f3s se formar para pagar empr\u00e9stimos'], correct:1, feedbackCorrect:'&#10003; A FAFSA \u00e9 a porta de entrada para o aux\u00edlio financeiro federal \u2014 envie cedo e reenvie todo ano que estiver matriculado.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. A FAFSA \u00e9 a porta de entrada para o aux\u00edlio financeiro federal.'},
        {question:'O que voc\u00ea deve fazer ao ler uma descri\u00e7\u00e3o de vaga antes de se candidatar?', options:['Verificar apenas o t\u00edtulo do cargo e o sal\u00e1rio','Adaptar a linguagem do seu curr\u00edculo e carta de apresenta\u00e7\u00e3o \u00e0s palavras espec\u00edficas da vaga','Enviar o mesmo curr\u00edculo para todas as vagas sem mudan\u00e7as','Esperar at\u00e9 atender 100% dos requisitos antes de se candidatar'], correct:1, feedbackCorrect:'&#10003; Adaptar sua candidatura \u00e0 linguagem da vaga mostra compatibilidade e ajuda a passar pelos sistemas de triagem autom\u00e1tica.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Adaptar sua candidatura \u00e0 linguagem da vaga te ajuda a se destacar.'},
        {question:'Para que o m\u00e9todo STAR te ajuda em uma entrevista?', options:['Lembrar o nome do entrevistador','Estruturar suas respostas a perguntas comportamentais usando Situa\u00e7\u00e3o, Tarefa, A\u00e7\u00e3o, Resultado','Decidir o que vestir','Calcular seu sal\u00e1rio ideal'], correct:1, feedbackCorrect:'&#10003; O STAR d\u00e1 \u00e0s suas respostas de entrevista um in\u00edcio, meio e fim claros \u2014 fazendo voc\u00ea soar preparado e cred\u00edvel.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. O STAR estrutura suas respostas: Situa\u00e7\u00e3o, Tarefa, A\u00e7\u00e3o, Resultado.'},
        {question:'O que \u00e9 mais importante verificar em uma carta de aux\u00edlio financeiro?', options:['O mascote e as cores da escola','A diferen\u00e7a entre bolsas (dinheiro gratuito) e empr\u00e9stimos (dinheiro que voc\u00ea devolve)','Se seu amigo recebeu a mesma oferta','O comprimento da carta'], correct:1, feedbackCorrect:'&#10003; Muitos estudantes aceitam empr\u00e9stimos achando que s\u00e3o bolsas. Sempre subtraia os empr\u00e9stimos para ver seu custo real.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Sempre identifique e subtraia os empr\u00e9stimos para entender o custo real da faculdade.'},
        {question:'\u00c9 aceit\u00e1vel pedir tempo antes de aceitar uma oferta de emprego?', options:['N\u00e3o, voc\u00ea precisa decidir imediatamente ou retirar\u00e3o a oferta','Sim, pedir 24-48 horas para revisar \u00e9 completamente profissional e esperado','Apenas se tiver outra oferta em m\u00e3os','Apenas para est\u00e1gios, n\u00e3o para empregos de tempo integral'], correct:1, feedbackCorrect:'&#10003; Empregadores esperam que candidatos levem tempo para revisar uma oferta. Pedir 24-48 horas \u00e9 padr\u00e3o e profissional.', feedbackWrong:'N\u00e3o exatamente \u2014 a resposta \u00e9 B. Pedir 24-48 horas para revisar uma oferta \u00e9 completamente profissional e esperado.'}
      ]

      chunks:[
        {title:'Кто ты в интернете?', content:'Твоя <span class="kw">цифровая личность</span> — это всё, что работодатели и колледжи видят до встречи с тобой. Она включает твои <span class="kw">социальные сети</span>, твой <span class="kw">электронный адрес</span>, твой <span class="kw">профиль в LinkedIn</span> и всё, что появляется, когда кто-то гуглит твоё имя.'},

    {
      id:2, title:'ИИ-инструменты и ты', description:'Научись использовать ИИ ответственно, распознавать контент, созданный ИИ, и защищать свою академическую честность.',
      chunks:[
        {title:'Как ответственно использовать ChatGPT', content:'ИИ-инструменты, такие как <span class="kw">ChatGPT</span>, помогут тебе генерировать идеи, составлять план и редактировать \u2014 но это лишь отправная точка, а не готовый продукт. Всегда <span class="kw">проверяй факты</span>, потому что ИИ может уверенно говорить неправильные вещи. Используй ИИ, чтобы улучшить своё мышление, а не заменить его.'},
        {title:'Академическая честность и ИИ', content:'В большинстве школ есть правила об использовании ИИ \u2014 знай их, прежде чем сдавать работу. Использовать ИИ для написания целого эссе и сдавать его как своё считается <span class="kw">академической нечестностью</span>. Главный вопрос: я что-то узнал или просто дал машине думать за меня? Твой рост важнее оценки.'},
        {title:'Как распознать контент, созданный ИИ', content:'Тексты ИИ обычно слишком гладкие, расплывчатые и содержат фразы-пустышки вроде \u00abважно отметить\u00bb. Умение распознавать контент, <span class="kw">созданный ИИ</span>, становится важным навыком \u2014 работодатели, преподаватели и журналисты учатся его замечать.'},
        {title:'Как писать сильные запросы', content:'Что ты получишь от ИИ \u2014 зависит от того, что ты просишь. Слабый <span class="kw">запрос</span>: \u00abНапиши мне эссе\u00bb. Сильный <span class="kw">запрос</span>: \u00abНапиши аргументированное эссе из 3 абзацев для старшеклассников о том, почему год до колледжа полезен, с двумя реальными примерами\u00bb. Указывай формат, аудиторию, объём и тон.'},
        {title:'ИИ-инструменты, которые нужно знать', content:'Кроме ChatGPT: <span class="kw">Grammarly</span> помогает с грамматикой и тоном, <span class="kw">Google NotebookLM</span> суммаризирует исследования, <span class="kw">Otter.ai</span> транскрибирует встречи и лекции. Умение работать с ИИ \u2014 это уже рабочий навык.'}
      ],
      quiz:[
        {question:'Какой главный риск сдать работу, написанную ИИ, как свою?', options:['Это занимает слишком много времени на генерацию','Это нарушает правила академической честности и ты упускаешь настоящее обучение','ИИ всегда ошибается, поэтому это не будет иметь смысла','Учителя не могут это заметить'], correct:1, feedbackCorrect:'&#10003; Сдавать работу ИИ как свою считается нечестным в большинстве школ \u2014 и ты пропускаешь возможность развить настоящий навык.', feedbackWrong:'Не совсем \u2014 правильный ответ Б. Сдавать работу ИИ нечестно, и ты пропускаешь возможность научиться самому.'},
        {question:'Какой признак того, что контент мог быть создан ИИ?', options:['В нём есть орфографические ошибки','В нём есть личные истории и конкретные детали','Он слишком гладкий, расплывчатый и содержит фразы вроде \u00abважно отметить\u00bb','Он очень короткий'], correct:2, feedbackCorrect:'&#10003; Тексты ИИ бывают гладкими, но расплывчатыми \u2014 они избегают конкретики и часто используют фразы-пустышки.', feedbackWrong:'Не совсем \u2014 правильный ответ В. Тексты ИИ гладкие, но расплывчатые, с фразами-пустышками.'},
        {question:'Что делает запрос к ИИ сильным?', options:['Делать его как можно короче','Указывать формат, аудиторию, объём и тон','Просить ИИ делать всё за тебя','Использовать только одно слово'], correct:1, feedbackCorrect:'&#10003; Конкретные запросы дают конкретные результаты. Чем больше контекста \u2014 тем лучше ответ.', feedbackWrong:'Не совсем \u2014 правильный ответ Б. Конкретные запросы дают конкретные результаты.'},
        {question:'Как нужно относиться к информации от ИИ при исследовании темы?', options:['Скопировать и вставить прямо в задание','Считать её всегда точной','Использовать как отправную точку и проверять всё','Вообще не использовать ИИ для исследований'], correct:2, feedbackCorrect:'&#10003; ИИ может уверенно выдавать ложную информацию. Всегда проверяй факты в надёжных источниках.', feedbackWrong:'Не совсем \u2014 правильный ответ В. ИИ может ошибаться. Всегда проверяй в надёжных источниках.'},
        {question:'Какой из этих инструментов \u2014 настоящий ИИ-инструмент, используемый в профессиональной среде?', options:['SpellBot 3000','Otter.ai для транскрибирования встреч и лекций','GradeMe AI','AutoEssay Pro'], correct:1, feedbackCorrect:'&#10003; Otter.ai \u2014 широко используемый профессиональный инструмент, который транскрибирует разговоры в реальном времени.', feedbackWrong:'Не совсем \u2014 правильный ответ Б. Otter.ai транскрибирует разговоры в реальном времени и широко используется профессионалами.'}

    {
