<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading — Hello, School!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

/*
  CRAYOLA COLOR PALETTE
  ─────────────────────
  Crayola Red      #EE204D
  Mango Tango      #FF8243
  Laser Lemon      #FEFE22
  Inchworm         #B2EC5D
  Cerulean         #1DACD6
  Royal Purple     #7851A9
  Tickle Me Pink   #FC89AC
  Sky Blue         #80DAEB
  Jungle Green     #3BB08F
  Granny Smith     #A8E4A0
*/

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #EE204D;
  --orange: #FF8243;
  --yellow: #FEFE22;
  --lime:   #B2EC5D;
  --blue:   #1DACD6;
  --purple: #7851A9;
  --pink:   #FC89AC;
  --sky:    #80DAEB;
  --green:  #3BB08F;
  --grass:  #A8E4A0;
  --ink:    #1A1A1A;
  --white:  #FFFFFF;
  --paper:  #FFFEF0;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Baloo 2', cursive;
  background: var(--sky);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
}

/* ── SKY ── */
.sky {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #5EC8E8 0%, #9ACEEB 48%, #C5EEFA 100%);
}

/* Subtle horizontal line texture like construction paper */
.sky::after {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    0deg, rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 1px, transparent 5px
  );
  pointer-events: none; z-index: 0;
}

/* ── CLOUDS ── */
.cloud {
  position: fixed;
  border-radius: 50px;
  background: #FEFDF7;
  opacity: 0.9;
  z-index: 1;
  animation: cloud-drift linear infinite;
  filter: drop-shadow(0 4px 10px rgba(120,81,169,0.10));
}
.cloud::before, .cloud::after {
  content: ''; position: absolute;
  background: #FEFDF7; border-radius: 50%;
}
.c1 { width:140px; height:44px; top:8%;  left:-160px; animation-duration:28s; }
.c1::before { width:70px; height:70px; top:-32px; left:18px; }
.c1::after  { width:50px; height:50px; top:-22px; left:60px; }
.c2 { width:100px; height:32px; top:17%; left:-120px; animation-duration:38s; animation-delay:-12s; }
.c2::before { width:52px; height:52px; top:-26px; left:14px; }
.c2::after  { width:38px; height:38px; top:-18px; left:46px; }
.c3 { width:180px; height:52px; top:4%;  left:-200px; animation-duration:22s; animation-delay:-7s; }
.c3::before { width:90px; height:90px; top:-44px; left:24px; }
.c3::after  { width:64px; height:64px; top:-30px; left:80px; }
.c4 { width:110px; height:36px; top:22%; left:-130px; animation-duration:45s; animation-delay:-22s; }
.c4::before { width:56px; height:56px; top:-28px; left:12px; }
.c4::after  { width:42px; height:42px; top:-20px; left:52px; }

@keyframes cloud-drift {
  from { transform: translateX(0); }
  to   { transform: translateX(calc(100vw + 240px)); }
}

/* ── SUN — Laser Lemon ── */
.sun {
  position: fixed; top:6%; right:8%;
  width:72px; height:72px;
  background: radial-gradient(circle at 35% 35%, #FFFF77, #FEFE22);
  border-radius: 50%; z-index: 2;
  border: 3px solid rgba(0,0,0,0.08);
  box-shadow: 0 0 0 12px rgba(254,254,34,0.22), 0 0 0 28px rgba(254,254,34,0.10);
  animation: sun-pulse 3.5s ease-in-out infinite;
}
.sun-ray {
  position: absolute; width:6px; height:22px;
  background: #FEFE22; border-radius: 4px;
  top:50%; left:50%; transform-origin: 50% 0;
  opacity: 0.6;
}
@keyframes sun-pulse {
  0%,100%{ box-shadow: 0 0 0 12px rgba(254,254,34,0.22), 0 0 0 28px rgba(254,254,34,0.10); }
  50%    { box-shadow: 0 0 0 18px rgba(254,254,34,0.28), 0 0 0 40px rgba(254,254,34,0.12); }
}

/* ── GROUND — Granny Smith Apple ── */
.ground {
  position: fixed; bottom:0; left:0; right:0;
  height:32%; z-index:3;
}
.grass-back {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #A8E4A0 0%, #3BB08F 100%);
  border-radius: 60% 60% 0 0 / 18px 18px 0 0;
}
.grass-back::before {
  content: ''; position: absolute;
  top:-12px; left:0; right:0; height:24px;
  background: repeating-linear-gradient(
    90deg, transparent 0, transparent 10px,
    #B2EC5D 10px, #B2EC5D 13px
  );
}
.path {
  position: absolute; bottom:0; left:50%;
  transform: translateX(-50%);
  width:90px; height:100%;
  background: linear-gradient(180deg, #F5D9A8 0%, #D4AA70 100%);
  clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
}

/* ── SCHOOL ── */
.school-wrap {
  position: fixed; bottom:28%; left:50%;
  transform: translateX(-50%); z-index:4;
  opacity:0;
  animation: school-pop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
}
@keyframes school-pop {
  from { opacity:0; transform:translateX(-50%) scale(0.7) translateY(30px); }
  to   { opacity:1; transform:translateX(-50%) scale(1) translateY(0); }
}
.school { width:300px; height:auto; }

/* ── FLOWERS ── */
.flowers {
  position: fixed; bottom:27%; z-index:5;
  display:flex; gap:8px; opacity:0;
  animation: flowers-in 1s ease 0.9s forwards;
}
.flowers-left  { left:  calc(50% - 220px); }
.flowers-right { right: calc(50% - 220px); }
@keyframes flowers-in {
  from { opacity:0; transform:translateY(20px) scale(0.6); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.flower { display:flex; flex-direction:column; align-items:center; }
.flower-head { font-size:28px; animation:flower-sway 2.5s ease-in-out infinite; }
.flower-stem { width:3px; height:22px; background:#3BB08F; border-radius:2px; margin-top:-4px; }
.flower:nth-child(2) .flower-head { animation-delay:.4s; font-size:22px; }
.flower:nth-child(3) .flower-head { animation-delay:.8s; font-size:26px; }
@keyframes flower-sway {
  0%,100%{ transform:rotate(-4deg); }
  50%    { transform:rotate(4deg); }
}

/* ── CHARACTER ── */
.character-wrap {
  position:fixed; bottom:29%; z-index:6;
  animation: walk-in 1.8s cubic-bezier(0.25,1,0.5,1) forwards;
}
@keyframes walk-in {
  from { left:-100px; }
  to   { left:calc(50% - 130px); }
}
.character {
  font-size:56px; display:block;
  animation: character-bob 0.5s ease-in-out infinite alternate;
  filter: drop-shadow(2px 6px 6px rgba(0,0,0,0.18));
}
@keyframes character-bob {
  from { transform:translateY(0) rotate(-2deg); }
  to   { transform:translateY(-5px) rotate(2deg); }
}
.backpack {
  position:absolute; font-size:26px; top:4px; right:-18px;
  animation: backpack-swing 0.5s ease-in-out infinite alternate;
}
@keyframes backpack-swing {
  from { transform:rotate(-8deg); }
  to   { transform:rotate(5deg); }
}

/* ── FLOATING LETTERS ── */
.floating-letters { position:fixed; inset:0; z-index:2; pointer-events:none; }
.letter-float {
  position:absolute;
  font-family:'Fredoka One', cursive;
  opacity:0;
  -webkit-text-stroke: 1.5px rgba(0,0,0,0.10);
  paint-order: stroke fill;
  animation: letter-rise linear infinite;
}
@keyframes letter-rise {
  0%  { opacity:0;   transform:translateY(0)     rotate(-10deg) scale(0.6); }
  15% { opacity:0.85; }
  80% { opacity:0.5; }
  100%{ opacity:0;   transform:translateY(-130px) rotate(10deg) scale(1.15); }
}

/* ── BIRDS ── */
.bird { position:fixed; font-size:20px; z-index:3; opacity:0.85;
        animation:bird-fly linear infinite; }
.bird-1 { top:13%; animation-duration:12s; animation-delay:2s;  left:-40px; }
.bird-2 { top:20%; animation-duration:17s; animation-delay:6s;  left:-40px; }
@keyframes bird-fly {
  from { left:-40px; }
  to   { left:calc(100vw + 60px); }
}

/* ══════════════════════════════════════════
   MAIN CARD
   Thick crayon-border stacked shadow look
══════════════════════════════════════════ */
.card {
  position:relative; z-index:10;
  background: var(--paper);
  border-radius: 28px;
  padding: 44px 52px 36px;
  text-align: center;
  /* Triple ring: Red → Yellow → Blue = Crayola box colors */
  outline: 5px solid var(--red);
  outline-offset: 3px;
  box-shadow:
    0 0 0 10px var(--yellow),
    0 0 0 16px var(--blue),
    0 14px 50px rgba(0,0,0,0.20),
    0 4px 0 rgba(0,0,0,0.10);
  max-width: 480px;
  width: calc(100vw - 40px);
  opacity:0;
  animation: card-arrive 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.15s forwards;
}
@keyframes card-arrive {
  from { opacity:0; transform:scale(0.75) translateY(40px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

/* Rainbow crayon stripe — exact 8-crayon order */
.card-stripe {
  position:absolute; top:0; left:0; right:0;
  height:10px; border-radius:22px 22px 0 0;
  background: linear-gradient(90deg,
    #EE204D 0%,   /* Red */
    #FF8243 14%,  /* Mango Tango */
    #FEFE22 28%,  /* Laser Lemon */
    #B2EC5D 42%,  /* Inchworm */
    #1DACD6 57%,  /* Cerulean */
    #7851A9 71%,  /* Royal Purple */
    #FC89AC 85%,  /* Tickle Me Pink */
    #80DAEB 100%  /* Sky Blue */
  );
}

/* ── MASCOT ── */
.mascot {
  font-size:72px; display:block; margin-bottom:8px;
  animation:
    mascot-in    1s cubic-bezier(0.34,1.56,0.64,1) 0.5s both,
    mascot-float 3s ease-in-out 1.5s infinite;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
}
@keyframes mascot-in {
  from { transform:scale(0) rotate(-20deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg);   opacity:1; }
}
@keyframes mascot-float {
  0%,100%{ transform:translateY(0)    rotate(-3deg); }
  50%    { transform:translateY(-10px) rotate(3deg); }
}

/* ── GREETING — Crayola Red with ink outline = sticker look ── */
.greeting {
  font-family:'Fredoka One', cursive;
  font-size:34px; line-height:1.15; margin-bottom:6px;
  color: var(--red);
  -webkit-text-stroke: 2px #1A1A1A;
  paint-order: stroke fill;
  animation: text-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.9s both;
}
@keyframes text-pop {
  from { opacity:0; transform:scale(0.7); }
  to   { opacity:1; transform:scale(1); }
}
.sub-greeting {
  font-size:15px; font-weight:700;
  color: var(--purple);
  margin-bottom:28px;
  animation: text-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.1s both;
}

/* ── PROGRESS BAR ── */
.progress-area { margin-bottom:20px; animation: text-pop 0.6s ease 1.3s both; }
.progress-label {
  font-size:13px; font-weight:800; text-transform:uppercase;
  letter-spacing:0.5px; color: var(--purple); margin-bottom:10px;
}
.progress-track {
  position:relative; height:22px;
  background:#EEF9EE; border-radius:20px; overflow:visible;
  border: 3px solid var(--ink);
  box-shadow: 2px 3px 0 rgba(0,0,0,0.20);
}
.progress-fill {
  height:100%; border-radius:16px;
  /* Crawling rainbow — all 8 Crayola colors */
  background: linear-gradient(90deg,
    #EE204D, #FF8243, #FEFE22, #B2EC5D,
    #1DACD6, #7851A9, #FC89AC, #EE204D
  );
  background-size: 300% 100%;
  animation: rainbow-crawl 2.2s linear infinite;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  position:relative; min-width:0;
}
@keyframes rainbow-crawl {
  from { background-position:100% 0; }
  to   { background-position:-200% 0; }
}
.pencil-tip {
  position:absolute; right:-18px; top:50%;
  transform:translateY(-50%); font-size:22px;
  animation: pencil-jiggle 0.3s ease infinite alternate;
  filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.2));
}
@keyframes pencil-jiggle {
  from { transform:translateY(-50%) rotate(-6deg); }
  to   { transform:translateY(-56%) rotate(6deg); }
}
.progress-pct {
  font-family:'Fredoka One', cursive;
  font-size:22px; color:var(--blue);
  margin-top:10px; height:28px;
}

/* ── ROLLING WORD ── */
.rolling-word-wrap {
  margin-bottom:24px; height:38px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  overflow:hidden;
  animation: text-pop 0.6s ease 1.5s both;
}
.rolling-prefix { font-size:14px; font-weight:800; color:#AAA; }
.rolling-word {
  font-family:'Fredoka One', cursive; font-size:22px;
  color: var(--orange);
  -webkit-text-stroke: 1px rgba(0,0,0,0.12);
  animation: word-spin 0.35s cubic-bezier(0.4,0,0.2,1);
  display:inline-block;
}
@keyframes word-spin {
  from { opacity:0; transform:translateY(20px) scale(0.8); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── ABC DOTS — exact Crayola 6-pack colors, chunky block look ── */
.abc-dots {
  display:flex; justify-content:center; gap:8px;
  animation: text-pop 0.6s ease 1.6s both;
}
.abc-dot {
  width:38px; height:38px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One', cursive; font-size:18px; color:white;
  border: 2.5px solid rgba(0,0,0,0.28);
  box-shadow: 3px 4px 0 rgba(0,0,0,0.25);
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.abc-dot:nth-child(1){ background:#EE204D; animation-delay:0.00s; }
.abc-dot:nth-child(2){ background:#FF8243; animation-delay:0.10s; }
.abc-dot:nth-child(3){ background:#FEFE22; color:#333; animation-delay:0.20s; }
.abc-dot:nth-child(4){ background:#1CAC78; animation-delay:0.30s; }
.abc-dot:nth-child(5){ background:#1DACD6; animation-delay:0.40s; }
.abc-dot:nth-child(6){ background:#7851A9; animation-delay:0.50s; }

@keyframes dot-bounce {
  0%,100%{ transform:translateY(0)    scale(1); }
  40%    { transform:translateY(-13px) scale(1.18); }
  60%    { transform:translateY(-6px)  scale(1.06); }
}

/* ── STARBURST + BUTTON ── */
.starburst {
  display:none; font-size:48px; margin-bottom:8px;
  animation: burst-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes burst-pop {
  from { transform:scale(0) rotate(-30deg); }
  to   { transform:scale(1) rotate(0deg); }
}

/* Button = Crayola Red crayon label style */
.enter-btn {
  display:none; align-items:center; justify-content:center; gap:10px;
  background: var(--red);
  color: white;
  border: 3px solid var(--ink);
  border-radius: 50px;
  padding: 16px 40px;
  font-family:'Fredoka One', cursive; font-size:22px;
  cursor:pointer; margin:16px auto 0; width:100%;
  box-shadow: 4px 6px 0 #8B0000, 6px 8px 0 rgba(0,0,0,0.12);
  transition: all 0.12s;
  letter-spacing: 0.5px;
}
.enter-btn:hover {
  background: #D4003D;
  transform:translate(2px,2px);
  box-shadow:2px 4px 0 #8B0000, 4px 6px 0 rgba(0,0,0,0.12);
}
.enter-btn:active {
  transform:translate(4px,6px);
  box-shadow:0 0 0 #8B0000;
}

/* ── OVERLAY ── */
.loader-overlay {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
.loader-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }

.lesson-content {
  display:none; position:fixed; inset:0;
  background:#FFFEF0; z-index:0;
  align-items:center; justify-content:center;
  font-family:'Fredoka One', cursive; font-size:32px; color:var(--red);
  flex-direction:column; gap:16px;
}
.lesson-content.show { display:flex; }
</style>
</head>
<body>

<div class="lesson-content" id="lessonContent">
  <span style="font-size:64px;">🏫</span>
  Hello, School! Lesson Loaded
  <span style="font-family:'Baloo 2',cursive;font-size:18px;color:#888;font-weight:600;">
    (Your e-lesson appears here)
  </span>
</div>

<div class="loader-overlay" id="loaderOverlay">

  <div class="sky"></div>

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>

  <div class="bird bird-1">🐦</div>
  <div class="bird bird-2">🐦</div>

  <!-- Laser Lemon sun -->
  <div class="sun">
    <div class="sun-ray" style="transform:translateX(-50%) rotate(0deg)   translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(45deg)  translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(90deg)  translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(135deg) translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(180deg) translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(225deg) translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(270deg) translateY(-46px)"></div>
    <div class="sun-ray" style="transform:translateX(-50%) rotate(315deg) translateY(-46px)"></div>
  </div>

  <div class="floating-letters" id="floatingLetters"></div>

  <div class="ground">
    <div class="grass-back"></div>
    <div class="path"></div>
  </div>

  <!-- School — Crayola colored SVG -->
  <div class="school-wrap">
    <svg class="school" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
      <!-- Building — warm paper yellow -->
      <rect x="30" y="70" width="240" height="110" fill="#FFF9C4" rx="4"/>
      <!-- Roof — Crayola Red -->
      <polygon points="20,70 150,20 280,70" fill="#EE204D"/>
      <polygon points="20,70 150,20 280,70" fill="none" stroke="#B71C1C" stroke-width="2.5"/>
      <!-- Bell tower — Tickle Me Pink -->
      <rect x="120" y="30" width="60" height="40" fill="#FC89AC"/>
      <polygon points="115,30 150,10 185,30" fill="#E91E63"/>
      <!-- Bell — Laser Lemon -->
      <ellipse cx="150" cy="52" rx="8" ry="10" fill="#FEFE22" stroke="#E6AC00" stroke-width="1.5"/>
      <line x1="150" y1="58" x2="150" y2="64" stroke="#5D4037" stroke-width="2"/>
      <!-- Flag — Red -->
      <line x1="150" y1="10" x2="150" y2="2" stroke="#5D4037" stroke-width="2"/>
      <polygon points="150,2 167,7 150,12" fill="#EE204D"/>
      <!-- Door — Mango Tango -->
      <rect x="120" y="120" width="60" height="60" rx="30 30 0 0" fill="#FF8243"/>
      <rect x="125" y="125" width="50" height="55" rx="25 25 0 0" fill="#E64A19"/>
      <circle cx="162" cy="158" r="4" fill="#FEFE22"/>
      <!-- Windows — Sky Blue / Cerulean -->
      <rect x="45"  y="90" width="50" height="44" rx="6" fill="#80DAEB"/>
      <rect x="45"  y="90" width="50" height="44" rx="6" fill="none" stroke="#1DACD6" stroke-width="2"/>
      <line x1="70" y1="90" x2="70" y2="134" stroke="#1DACD6" stroke-width="1.5"/>
      <line x1="45" y1="112" x2="95" y2="112" stroke="#1DACD6" stroke-width="1.5"/>
      <rect x="205" y="90" width="50" height="44" rx="6" fill="#80DAEB"/>
      <rect x="205" y="90" width="50" height="44" rx="6" fill="none" stroke="#1DACD6" stroke-width="2"/>
      <line x1="230" y1="90" x2="230" y2="134" stroke="#1DACD6" stroke-width="1.5"/>
      <line x1="205" y1="112" x2="255" y2="112" stroke="#1DACD6" stroke-width="1.5"/>
      <!-- Sign — Royal Purple -->
      <rect x="110" y="104" width="80" height="18" rx="5" fill="#7851A9"/>
      <text x="150" y="117" text-anchor="middle"
        font-family="'Fredoka One',cursive" font-size="10" fill="white">SCHOOL</text>
      <!-- Steps — sand path color -->
      <rect x="115" y="178" width="70" height="6" rx="2" fill="#D4AA70"/>
    </svg>
  </div>

  <!-- Flowers -->
  <div class="flowers flowers-left">
    <div class="flower"><span class="flower-head">🌸</span><div class="flower-stem"></div></div>
    <div class="flower"><span class="flower-head">🌼</span><div class="flower-stem"></div></div>
    <div class="flower"><span class="flower-head">🌺</span><div class="flower-stem"></div></div>
  </div>
  <div class="flowers flowers-right">
    <div class="flower"><span class="flower-head">🌻</span><div class="flower-stem"></div></div>
    <div class="flower"><span class="flower-head">🌸</span><div class="flower-stem"></div></div>
    <div class="flower"><span class="flower-head">🌼</span><div class="flower-stem"></div></div>
  </div>

  <!-- Walking child -->
  <div class="character-wrap" id="characterWrap">
    <span class="character">🧒</span>
    <span class="backpack">🎒</span>
  </div>

  <!-- CARD -->
  <div class="card" id="mainCard">
    <div class="card-stripe"></div>
    <span class="mascot" id="mascot">📚</span>
    <div class="greeting" id="greeting">Get Ready to Learn!</div>
    <div class="sub-greeting">Hello, School! · Unit K1 · Kindergarten</div>

    <div class="progress-area">
      <div class="progress-label" id="progressLabel">Loading your lesson…</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%">
          <span class="pencil-tip" id="pencilTip">✏️</span>
        </div>
      </div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>

    <div class="rolling-word-wrap">
      <span class="rolling-prefix">Loading:</span>
      <span class="rolling-word" id="rollingWord">vocabulary</span>
    </div>

    <div class="abc-dots" id="abcDots">
      <div class="abc-dot">A</div>
      <div class="abc-dot">B</div>
      <div class="abc-dot">C</div>
      <div class="abc-dot">1</div>
      <div class="abc-dot">2</div>
      <div class="abc-dot">3</div>
    </div>

    <div class="starburst" id="starburst">🌟</div>
    <button class="enter-btn" id="enterBtn" onclick="enterLesson()">Let's Go! →</button>
  </div>

</div>

<script>
const LOAD_DURATION = 4200;
const LOADING_WORDS = [
  "vocabulary","sentence frames","activities",
  "word games","fun facts","pictures",
  "stories","practice","your lesson"
];
const MASCOT_SEQ = ["📚","✏️","🖍️","📖","🏫","⭐"];

/* Crayola 8-box palette for floating letters */
const CRAYON_COLORS = [
  '#EE204D','#FF8243','#FEFE22','#B2EC5D',
  '#1DACD6','#7851A9','#FC89AC','#80DAEB'
];
const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabc123".split('');

function spawnLetter() {
  const el = document.createElement('div');
  el.className = 'letter-float';
  el.textContent = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  el.style.cssText = `
    left:${Math.random()*95}%;
    bottom:28%;
    color:${CRAYON_COLORS[Math.floor(Math.random()*CRAYON_COLORS.length)]};
    font-size:${18+Math.random()*20}px;
    animation-duration:${2.5+Math.random()*2}s;
    animation-delay:0s;
  `;
  document.getElementById('floatingLetters').appendChild(el);
  setTimeout(()=>el.remove(), 5000);
}
setInterval(spawnLetter, 350);

let progress=0, wordIdx=0, mascotIdx=0, startTime=null;

function easeInOut(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

function tick(ts) {
  if(!startTime) startTime=ts;
  const raw = Math.min((ts-startTime)/LOAD_DURATION, 1);
  progress = easeInOut(raw)*100;
  document.getElementById('progressFill').style.width = progress+'%';
  document.getElementById('progressPct').textContent = Math.round(progress)+'%';
  if(progress>=99) document.getElementById('pencilTip').style.opacity='0';
  raw<1 ? requestAnimationFrame(tick) : onComplete();
}

function cycleWord() {
  const el = document.getElementById('rollingWord');
  el.style.animation='none'; void el.offsetWidth;
  el.textContent = LOADING_WORDS[wordIdx++%LOADING_WORDS.length];
  el.style.animation='word-spin 0.35s cubic-bezier(0.4,0,0.2,1)';
}

function cycleMascot() {
  const el = document.getElementById('mascot');
  el.style.transform='scale(0) rotate(-20deg)';
  setTimeout(()=>{
    el.textContent = MASCOT_SEQ[mascotIdx++%MASCOT_SEQ.length];
    el.style.transition='transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.transform='';
  }, 200);
}

function onComplete() {
  document.getElementById('progressLabel').textContent='✅ Ready!';
  document.getElementById('progressPct').textContent='100%';
  document.getElementById('rollingWord').textContent='your lesson! 🎉';

  /* Swap ABC blocks to Crayola-colored stars */
  const dots = document.getElementById('abcDots');
  dots.innerHTML = CRAYON_COLORS.map((c,i)=>
    `<span style="font-size:26px;display:inline-block;color:${c};
      -webkit-text-stroke:1px rgba(0,0,0,0.2);
      animation:dot-bounce 1.2s ease-in-out ${i*0.1}s infinite;">★</span>`
  ).join('');

  document.getElementById('starburst').style.display='block';
  document.getElementById('enterBtn').style.display='flex';
  document.getElementById('greeting').textContent="You're Ready! 🌟";
  document.getElementById('mascot').textContent='🌟';

  const c=document.getElementById('characterWrap');
  c.style.animation='none'; c.style.left='calc(50% - 130px)';

  confetti();
}

function enterLesson() {
  document.getElementById('loaderOverlay').classList.add('hidden');
  document.getElementById('lessonContent').classList.add('show');
}

function confetti() {
  for(let i=0;i<60;i++){
    const d=document.createElement('div');
    const col=CRAYON_COLORS[Math.floor(Math.random()*CRAYON_COLORS.length)];
    const sz=7+Math.random()*9;
    const dur=1.6+Math.random()*2;
    const delay=Math.random()*1.2;
    const rot=(Math.random()>.5?'':'-')+(180+Math.random()*280);
    const tx=(Math.random()-.5)*140;
    d.style.cssText=`position:fixed;left:${15+Math.random()*70}%;top:-20px;
      width:${sz}px;height:${sz}px;background:${col};
      border-radius:${Math.random()>.5?'50%':'3px'};
      border:1.5px solid rgba(0,0,0,0.15);
      z-index:99999;pointer-events:none;
      animation:cf${i} ${dur}s ${delay}s linear forwards;`;
    const s=document.createElement('style');
    s.textContent=`@keyframes cf${i}{0%{top:-20px;opacity:1;transform:rotate(0)}100%{top:110vh;opacity:0;transform:rotate(${rot}deg) translateX(${tx}px)}}`;
    document.head.appendChild(s);
    document.body.appendChild(d);
    setTimeout(()=>{d.remove();s.remove();},(dur+delay)*1000+500);
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>requestAnimationFrame(tick), 1000);
  cycleWord();
  setInterval(cycleWord, 600);
  setInterval(cycleMascot, 900);

  const labels=[
    "Loading your lesson…","Getting vocabulary ready…",
    "Setting up activities…","Almost there…",
    "One moment…","Ready soon…"
  ];
  let li=0;
  setInterval(()=>{
    if(progress<99)
      document.getElementById('progressLabel').textContent=labels[li++%labels.length];
  }, 700);
});
</script>
</body>
</html>
